<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>寻找糯米香香吧 ！</title>
  <style>
    :root {
      --ink: #22323a;
      --muted: #60727c;
      --line: #d8e4e5;
      --paper: #fbfefd;
      --mint: #dff6ef;
      --mint-strong: #74d7bf;
      --sky: #dcefff;
      --peach: #ffe2d8;
      --pink: #ffe2ec;
      --lemon: #fff4bb;
      --lavender: #eee8ff;
      --shadow: 0 14px 32px rgba(50, 74, 85, 0.12);
      --radius: 8px;
      font-family:
        "Inter", "Pretendard", "Noto Sans SC", "Microsoft YaHei",
        system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(116, 215, 191, 0.10) 1px, transparent 1px),
        linear-gradient(rgba(255, 194, 213, 0.16) 1px, transparent 1px),
        linear-gradient(180deg, #f8fffc 0%, #f5fbff 42%, #fffaf7 100%);
      background-size: 18px 18px, 18px 18px, 100% 100%;
    }

    body {
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 30px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.9fr);
      gap: 16px;
      align-items: end;
      margin-bottom: 16px;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: 0;
      color: #1f3339;
    }

    .title-block p {
      max-width: 730px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-self: stretch;
    }

    .hud-item {
      min-height: 68px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 20px rgba(50, 74, 85, 0.06);
    }

    .hud-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 6px;
    }

    .hud-value {
      display: block;
      font-size: 1.18rem;
      font-weight: 800;
      line-height: 1.1;
      color: #22323a;
      overflow-wrap: anywhere;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 16px;
      align-items: stretch;
    }

    .game-column {
      min-width: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .primary-btn,
    .ghost-btn,
    .modal-btn {
      min-height: 44px;
      padding: 0 18px;
      border-radius: var(--radius);
      font-weight: 800;
      letter-spacing: 0;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .primary-btn,
    .modal-btn {
      color: #153438;
      background: var(--mint-strong);
      box-shadow: 0 8px 0 #3da991, 0 14px 22px rgba(61, 169, 145, 0.18);
    }

    .ghost-btn {
      color: #34454d;
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: 0 8px 0 #c8d8da, 0 14px 22px rgba(80, 110, 120, 0.10);
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .modal-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn:active,
    .ghost-btn:active,
    .modal-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 rgba(61, 169, 145, 0.5), 0 8px 16px rgba(80, 110, 120, 0.08);
    }

    .stage-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.74);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .arena {
      position: relative;
      height: clamp(420px, 64vh, 690px);
      min-height: 420px;
      touch-action: none;
      user-select: none;
      cursor: crosshair;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255, 226, 236, 0.72), rgba(255, 226, 236, 0) 36%),
        linear-gradient(225deg, rgba(220, 239, 255, 0.85), rgba(220, 239, 255, 0) 40%),
        linear-gradient(315deg, rgba(255, 244, 187, 0.72), rgba(255, 244, 187, 0) 34%),
        #fafffc;
    }

    .arena::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(34, 50, 58, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(34, 50, 58, 0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 88%, transparent);
    }

    .arena::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 2px dashed rgba(80, 119, 125, 0.18);
      border-radius: 6px;
      pointer-events: none;
    }

    .arena-idle {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
      padding: 24px;
      z-index: 3;
    }

    .idle-panel {
      display: inline-grid;
      gap: 10px;
      width: min(460px, 100%);
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 12px 26px rgba(50, 74, 85, 0.12);
    }

    .idle-title {
      font-size: 1.2rem;
      font-weight: 900;
    }

    .idle-text {
      color: var(--muted);
      line-height: 1.7;
    }

    .cursor-wave {
      position: absolute;
      left: 0;
      top: 0;
      width: 72px;
      height: 72px;
      border: 2px solid rgba(61, 169, 145, 0.62);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 5;
      transition: opacity 160ms ease;
    }

    .cursor-wave::before,
    .cursor-wave::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255, 135, 168, 0.55);
      border-radius: 50%;
    }

    .cursor-wave::after {
      inset: 22px;
      border-color: rgba(93, 152, 214, 0.55);
    }

    .cursor-wave.is-visible {
      opacity: 1;
      animation: breathe 980ms ease-in-out infinite;
    }

    @keyframes breathe {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(0.92);
      }
      50% {
        transform: translate(-50%, -50%) scale(1.06);
      }
    }

    .found-pop {
      position: absolute;
      width: 118px;
      height: 142px;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%) scale(0.6);
      pointer-events: none;
      z-index: 10;
      animation: popMember 1180ms cubic-bezier(.18, .95, .25, 1) forwards;
    }

    .found-frame {
      position: relative;
      width: 104px;
      height: 124px;
      border: 2px solid #293d44;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow:
        5px 5px 0 rgba(36, 54, 61, 0.18),
        0 16px 28px rgba(45, 70, 80, 0.18);
    }

    .found-frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
      background: #fff;
    }

    .fallback-avatar {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #20333a;
      font-size: 2rem;
      font-weight: 950;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.45) 50%, transparent 50%),
        linear-gradient(rgba(255, 255, 255, 0.35) 50%, transparent 50%),
        var(--avatar-bg, var(--mint));
      background-size: 12px 12px;
    }

    .found-name {
      position: absolute;
      left: 50%;
      bottom: -9px;
      transform: translateX(-50%);
      min-width: 86px;
      padding: 5px 9px;
      border: 1px solid #293d44;
      border-radius: 999px;
      background: #fff;
      color: #20333a;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 900;
      z-index: 3;
    }

    @keyframes popMember {
      0% {
        opacity: 0;
        transform: translate(-50%, -42%) scale(0.62) rotate(-4deg);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -58%) scale(1.08) rotate(2deg);
      }
      78% {
        opacity: 1;
        transform: translate(-50%, -58%) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -72%) scale(0.92) rotate(0deg);
      }
    }

    .click-note {
      position: absolute;
      min-width: 54px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.9);
      font-size: 0.78rem;
      font-weight: 800;
      text-align: center;
      pointer-events: none;
      z-index: 8;
      animation: fadeNote 700ms ease forwards;
    }

    @keyframes fadeNote {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(-18px);
      }
    }

    .member-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
    }

    .member-step {
      position: relative;
      min-width: 0;
      min-height: 58px;
      display: grid;
      place-items: center;
      padding: 8px 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #566a72;
      background: #fff;
      font-size: 0.78rem;
      font-weight: 850;
      text-align: center;
      overflow: hidden;
    }

    .member-step::before {
      content: "";
      position: absolute;
      top: 7px;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--step-color, var(--mint));
      box-shadow: 14px 0 0 rgba(255, 255, 255, 0.7), -14px 0 0 rgba(255, 255, 255, 0.7);
      opacity: 0.95;
    }

    .member-step span {
      position: relative;
      top: 8px;
      overflow-wrap: anywhere;
    }

    .member-step.is-current {
      border-color: #45b99f;
      color: #183f3d;
      background: #ecfff8;
      box-shadow: inset 0 -4px 0 rgba(116, 215, 191, 0.35);
    }

    .member-step.is-found {
      border-color: #f2b5c5;
      color: #52303c;
      background: #fff1f5;
    }

    .leaderboard {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .leaderboard-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(223, 246, 239, 0.88), rgba(255, 244, 187, 0.66));
    }

    .leaderboard-head h2 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0;
    }

    .leaderboard-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .score-list {
      max-height: 604px;
      overflow: auto;
      scrollbar-width: thin;
    }

    .score-row {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 92px;
      gap: 8px;
      align-items: center;
      min-height: 48px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(216, 228, 229, 0.74);
      background: rgba(255, 255, 255, 0.78);
    }

    .score-row:nth-child(3n + 1) {
      background: rgba(255, 226, 236, 0.33);
    }

    .score-row:nth-child(3n + 2) {
      background: rgba(220, 239, 255, 0.37);
    }

    .score-rank {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-weight: 950;
      color: #264045;
    }

    .score-id {
      min-width: 0;
      color: #24373d;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-time {
      color: #2e5d55;
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      text-align: right;
    }

    .empty-score {
      padding: 22px 14px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(28, 40, 45, 0.36);
      backdrop-filter: blur(7px);
      z-index: 100;
    }

    .modal-backdrop.is-open {
      display: grid;
    }

    .modal {
      width: min(430px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffefd;
      box-shadow: 0 22px 56px rgba(24, 39, 46, 0.22);
      overflow: hidden;
      animation: modalIn 180ms ease both;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-top {
      min-height: 86px;
      padding: 18px;
      background:
        linear-gradient(90deg, rgba(223, 246, 239, 0.92), rgba(255, 226, 216, 0.88));
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .modal-body {
      padding: 18px;
    }

    .modal-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .name-form {
      display: none;
      gap: 10px;
      margin-top: 16px;
    }

    .name-form.is-visible {
      display: grid;
    }

    .name-form label {
      color: #2d444b;
      font-weight: 900;
    }

    .name-form input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid #bfd2d4;
      border-radius: var(--radius);
      color: var(--ink);
      background: #fbfffe;
      outline: none;
    }

    .name-form input:focus {
      border-color: #45b99f;
      box-shadow: 0 0 0 4px rgba(116, 215, 191, 0.20);
    }

    .form-error {
      min-height: 20px;
      color: #bf3f5d;
      font-size: 0.86rem;
      font-weight: 800;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .tiny-footer {
      margin-top: 10px;
      color: #6d8188;
      font-size: 0.78rem;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 940px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .leaderboard {
        order: 2;
      }

      .score-list {
        max-height: 340px;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 18px, 1180px);
        padding-top: 14px;
      }

      .topbar {
        gap: 12px;
      }

      .hud {
        grid-template-columns: 1fr 1fr;
      }

      .hud-item {
        min-height: 62px;
        padding: 10px;
      }

      .hud-value {
        font-size: 1rem;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .primary-btn,
      .ghost-btn {
        width: 100%;
        padding: 0 10px;
      }

      .arena {
        height: min(68vh, 560px);
        min-height: 380px;
      }

      .member-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .found-pop {
        width: 104px;
        height: 126px;
      }

      .found-frame {
        width: 92px;
        height: 108px;
      }

      .score-row {
        grid-template-columns: 40px minmax(0, 1fr) 86px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <section class="title-block" aria-labelledby="gameTitle">
        <h1 id="gameTitle">寻找糯米香香吧 ！</h1>
        <p>移动鼠标依靠声音搜寻成员，必须按照指定顺序寻找，点错全盘重来，挑战用时登上排行榜</p>
      </section>

      <section class="hud" aria-label="本局状态">
        <div class="hud-item">
          <span class="hud-label">当前目标</span>
          <span class="hud-value" id="targetLabel">Lily</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">闯关进度</span>
          <span class="hud-value" id="progressLabel">0 / 6</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">本局计时</span>
          <span class="hud-value" id="timerLabel">0:00.000</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">声音状态</span>
          <span class="hud-value" id="soundLabel">待开始</span>
        </div>
      </section>
    </header>

    <div class="layout">
      <section class="game-column" aria-label="游戏区域">
        <div class="controls">
          <button class="primary-btn" id="startBtn" type="button">开始游戏</button>
          <button class="ghost-btn" id="soundUnlockBtn" type="button">开启声音</button>
          <button class="ghost-btn" id="restartBtn" type="button">重新开局</button>
        </div>

        <div class="stage-wrap">
          <div class="arena" id="arena" aria-label="主游玩画布区域">
            <div class="arena-idle" id="idleLayer">
              <div class="idle-panel">
                <div class="idle-title">按顺序找到六位 NMIXX 成员</div>
                <div class="idle-text">靠近隐藏点时，成员提示音会变大；多位成员靠近时会同时发声。</div>
              </div>
            </div>
            <div class="cursor-wave" id="cursorWave" aria-hidden="true"></div>
          </div>
          <div class="member-strip" id="memberStrip" aria-label="寻找顺序"></div>
        </div>
      </section>

      <aside class="leaderboard" aria-label="排行榜">
        <div class="leaderboard-head">
          <h2>本地排行榜</h2>
          <p>按通关用时升序排列，同一 ID 只保留最快成绩，最多展示前 100 名。</p>
        </div>
        <div class="score-list" id="scoreList"></div>
      </aside>
    </div>

  </main>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-top">
        <h2 class="modal-title" id="modalTitle">提示</h2>
      </div>
      <div class="modal-body">
        <p class="modal-message" id="modalMessage"></p>
        <form class="name-form" id="nameForm" novalidate>
          <label for="playerName">恩瑟报上名来，速速上榜！</label>
          <input id="playerName" name="playerName" maxlength="18" autocomplete="nickname" placeholder="输入昵称 ID">
          <div class="form-error" id="formError" aria-live="polite"></div>
        </form>
        <div class="modal-actions">
          <button class="ghost-btn" id="modalCloseBtn" type="button">关闭</button>
          <button class="modal-btn" id="submitScoreBtn" type="button">确认上榜</button>
        </div>
      </div>
    </div>
  </div>

  <audio id="startupAudioEl" src="nmixx.mp3" preload="auto" playsinline webkit-playsinline></audio>

  <script>
    "use strict";

    /**
     * 成员与素材统一配置。
     * 图片、距离提示循环音频按需求使用指定文件名；
     * hit_* 是命中专属音效的预留插槽，不放文件时会自动使用合成提示音。
     */
    const MEMBERS = [
      {
        name: "Lily",
        key: "lily",
        image: "lily.png",
        hintSound: "sound_lily.mp3",
        hitSound: "hit_lily.mp3",
        color: "#ffe2ec",
        tone: 392
      },
      {
        name: "Haewon",
        key: "haewon",
        image: "haewon.png",
        hintSound: "sound_haewon.mp3",
        hitSound: "hit_haewon.mp3",
        color: "#dff6ef",
        tone: 440
      },
      {
        name: "Sullyoon",
        key: "sullyoon",
        image: "sullyoon.png",
        hintSound: "sound_sullyoon.mp3",
        hitSound: "hit_sullyoon.mp3",
        color: "#dcefff",
        tone: 494
      },
      {
        name: "Bae",
        key: "bae",
        image: "bae.png",
        hintSound: "sound_bae.mp3",
        hitSound: "hit_bae.mp3",
        color: "#fff4bb",
        tone: 523
      },
      {
        name: "Jiwoo",
        key: "jiwoo",
        image: "jiwoo.png",
        hintSound: "sound_jiwoo.mp3",
        hitSound: "hit_jiwoo.mp3",
        color: "#ffe2d8",
        tone: 587
      },
      {
        name: "Kyujin",
        key: "kyujin",
        image: "kyujin.png",
        hintSound: "sound_kyujin.mp3",
        hitSound: "hit_kyujin.mp3",
        color: "#eee8ff",
        tone: 659
      }
    ];

    const STORAGE_KEY = "nuomi-nmixx-leaderboard-v1";
    const LEADERBOARD_API = "/api/leaderboard";
    const MAX_SCORES = 100;
    const HIT_RADIUS = 42;
    const MAX_HINT_VOLUME = 0.92;
    const EMPTY_CLICK_TEXT = "再听听";

    const dom = {
      arena: document.getElementById("arena"),
      cursorWave: document.getElementById("cursorWave"),
      idleLayer: document.getElementById("idleLayer"),
      memberStrip: document.getElementById("memberStrip"),
      startBtn: document.getElementById("startBtn"),
      soundUnlockBtn: document.getElementById("soundUnlockBtn"),
      restartBtn: document.getElementById("restartBtn"),
      targetLabel: document.getElementById("targetLabel"),
      progressLabel: document.getElementById("progressLabel"),
      timerLabel: document.getElementById("timerLabel"),
      soundLabel: document.getElementById("soundLabel"),
      scoreList: document.getElementById("scoreList"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      modalTitle: document.getElementById("modalTitle"),
      modalMessage: document.getElementById("modalMessage"),
      startupAudioEl: document.getElementById("startupAudioEl"),
      nameForm: document.getElementById("nameForm"),
      playerName: document.getElementById("playerName"),
      formError: document.getElementById("formError"),
      modalCloseBtn: document.getElementById("modalCloseBtn"),
      submitScoreBtn: document.getElementById("submitScoreBtn")
    };

    const state = {
      isRunning: false,
      isComplete: false,
      currentIndex: 0,
      startedAt: 0,
      elapsedMs: 0,
      timerFrame: 0,
      audioFrame: 0,
      positions: [],
      pointer: null,
      finalTime: 0,
      modalMode: "info",
      audioReady: false,
      audioPrimed: false,
      lastStartupSoundAt: 0,
      startupAudio: null,
      audioContext: null,
      masterGain: null,
      audioItems: [],
      oneShotAudios: [],
      leaderboardScores: [],
      leaderboardOnline: false
    };

    /**
     * 距离提示音使用 WebAudio 解码 mp3 后循环播放。
     * 这样比直接调 HTMLAudioElement.volume 更适合手机浏览器。
     */
    function prepareHintAudio() {
      state.audioItems = MEMBERS.map((member) => {
        return {
          member,
          audio: createHintElement(member.hintSound),
          buffer: null,
          source: null,
          hintGain: null,
          loadPromise: null,
          fileUsable: false,
          fileStarted: false,
          currentVolume: 0,
          targetVolume: 0
        };
      });
    }

    function createHintElement(src) {
      const audio = new Audio(src);
      audio.loop = true;
      audio.preload = "auto";
      audio.volume = 0;
      audio.muted = false;
      audio.setAttribute("playsinline", "");
      audio.setAttribute("webkit-playsinline", "");
      return audio;
    }

    function initGeneratedAudio() {
      if (state.audioContext) return;

      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor) {
        dom.soundLabel.textContent = "音频不可用";
        return;
      }

      state.audioContext = new AudioContextCtor();
      state.masterGain = state.audioContext.createGain();
      state.masterGain.gain.value = 0.46;
      state.masterGain.connect(state.audioContext.destination);

      state.audioItems.forEach((item) => {
        if (item.hintGain) return;

        const gain = state.audioContext.createGain();
        gain.gain.value = 0;
        gain.connect(state.masterGain);
        item.hintGain = gain;
      });
    }

    async function unlockAudio() {
      await primeAudioFromGesture();

      dom.soundLabel.textContent = "加载音频";
      Promise.all(state.audioItems.map(startHintFileAudio)).then((results) => {
        const loadedCount = results.filter(Boolean).length;
        dom.soundLabel.textContent = loadedCount > 0 ? "已开启" : "音频加载失败";
      });
    }

    async function primeAudioFromGesture() {
      initGeneratedAudio();

      if (state.audioContext && state.audioContext.state === "suspended") {
        await state.audioContext.resume().catch(() => {});
      }

      state.audioReady = true;
      if (!state.audioPrimed) {
        playUnlockTone();
        state.audioPrimed = true;
      }

      if (state.audioContext && state.audioContext.state === "running") {
        dom.soundLabel.textContent = "声音已准备";
      }
    }

    async function hardUnlockAudio() {
      await primeAudioFromGesture();
      dom.soundLabel.textContent = "测试声音";

      const tester = new Audio("nmixx.mp3");
      tester.preload = "auto";
      tester.volume = 1;
      tester.muted = false;
      tester.setAttribute("playsinline", "");
      tester.setAttribute("webkit-playsinline", "");

      try {
        await tester.play();
        window.setTimeout(() => {
          tester.pause();
          tester.currentTime = 0;
        }, 1300);
        await unlockAudio();
      } catch (error) {
        dom.soundLabel.textContent = "浏览器拦截";
      }
    }

    async function startHintFileAudio(item) {
      const htmlAudioReady = startHintElement(item);

      try {
        await loadHintBuffer(item);
        if (!state.audioContext || !item.hintGain) return htmlAudioReady;
        if (item.source) return true;

        const source = state.audioContext.createBufferSource();
        source.buffer = item.buffer;
        source.loop = true;
        source.connect(item.hintGain);
        source.start(0);
        item.source = source;
        item.fileStarted = true;
        item.fileUsable = true;
        dom.soundLabel.textContent = "已开启";
        return true;
      } catch (error) {
        item.fileStarted = htmlAudioReady;
        item.fileUsable = htmlAudioReady;
        return htmlAudioReady;
      }
    }

    function startHintElement(item) {
      if (!item.audio) return false;
      item.audio.volume = 0;

      const playPromise = item.audio.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise
          .then(() => {
            item.fileStarted = true;
            item.fileUsable = true;
          })
          .catch(() => {});
      }

      return true;
    }

    async function loadHintBuffer(item) {
      if (item.buffer) return item.buffer;
      if (!item.loadPromise) {
        item.loadPromise = fetch(item.member.hintSound, { cache: "force-cache" })
          .then((response) => {
            if (!response.ok) {
              throw new Error(`Audio not found: ${item.member.hintSound}`);
            }
            return response.arrayBuffer();
          })
          .then((data) => state.audioContext.decodeAudioData(data));
      }

      item.buffer = await item.loadPromise;
      return item.buffer;
    }

    function stopHintAudio() {
      state.audioItems.forEach((item) => {
        item.targetVolume = 0;
        item.currentVolume = 0;
        if (item.hintGain && state.audioContext) {
          item.hintGain.gain.setTargetAtTime(0, state.audioContext.currentTime, 0.025);
        }
        if (item.audio) {
          item.audio.volume = 0;
        }
      });
      dom.soundLabel.textContent = state.isComplete ? "已通关" : "待开始";
    }

    function startAudioLoop() {
      cancelAnimationFrame(state.audioFrame);

      const tick = () => {
        updateAudioVolumes();
        state.audioFrame = requestAnimationFrame(tick);
      };

      tick();
    }

    function updateAudioVolumes() {
      const now = state.audioContext ? state.audioContext.currentTime : 0;

      state.audioItems.forEach((item) => {
        item.currentVolume += (item.targetVolume - item.currentVolume) * 0.14;
        const smoothVolume = item.currentVolume < 0.003 ? 0 : item.currentVolume;

        if (item.fileUsable && item.fileStarted) {
          if (item.hintGain && state.audioContext) {
            item.hintGain.gain.setTargetAtTime(clamp(smoothVolume, 0, 1), now, 0.035);
          }
          if (item.audio) {
            item.audio.volume = clamp(smoothVolume, 0, 1);
          }
        } else {
          if (item.hintGain && state.audioContext) {
            item.hintGain.gain.setTargetAtTime(0, now, 0.035);
          }
          if (item.audio) {
            item.audio.volume = 0;
          }
        }
      });
    }

    function setVolumesFromPointer(point) {
      if (!state.isRunning || !point) return;

      const rect = dom.arena.getBoundingClientRect();
      const audibleRadius = Math.max(190, Math.min(rect.width, rect.height) * 0.56);

      state.audioItems.forEach((item, index) => {
        const hiddenPoint = state.positions[index];
        const distance = Math.hypot(point.x - hiddenPoint.x, point.y - hiddenPoint.y);
        const closeness = clamp(1 - distance / audibleRadius, 0, 1);
        item.targetVolume = Math.pow(closeness, 1.9) * MAX_HINT_VOLUME;
      });
    }

    function muteTargets() {
      state.audioItems.forEach((item) => {
        item.targetVolume = 0;
      });
    }

    function startTimer() {
      cancelAnimationFrame(state.timerFrame);
      state.startedAt = performance.now();
      state.elapsedMs = 0;
      renderTimer(0);

      const tick = () => {
        if (!state.isRunning) return;
        state.elapsedMs = performance.now() - state.startedAt;
        renderTimer(state.elapsedMs);
        state.timerFrame = requestAnimationFrame(tick);
      };

      state.timerFrame = requestAnimationFrame(tick);
    }

    function stopTimer() {
      cancelAnimationFrame(state.timerFrame);
    }

    function renderTimer(ms) {
      dom.timerLabel.textContent = formatTime(ms);
    }

    function formatTime(ms) {
      const safeMs = Math.max(0, Math.floor(ms));
      const minutes = Math.floor(safeMs / 60000);
      const seconds = Math.floor((safeMs % 60000) / 1000);
      const millis = safeMs % 1000;
      return `${minutes}:${String(seconds).padStart(2, "0")}.${String(millis).padStart(3, "0")}`;
    }

    function resetRun(options = {}) {
      state.isRunning = false;
      state.isComplete = false;
      state.currentIndex = 0;
      state.elapsedMs = 0;
      state.finalTime = 0;
      state.pointer = null;
      stopTimer();
      muteTargets();
      stopHintAudio();
      shufflePositions();
      renderTimer(0);
      renderHud();
      renderMemberStrip();
      renderScores();
      dom.startBtn.disabled = false;
      dom.idleLayer.style.display = "grid";
      dom.cursorWave.classList.remove("is-visible");

      if (options.clearPops) {
        dom.arena.querySelectorAll(".found-pop, .click-note").forEach((node) => node.remove());
      }
    }

    async function startGame() {
      playStartupSound(true);
      closeModal();
      resetRun({ clearPops: true });
      state.isRunning = true;
      state.isComplete = false;
      dom.startBtn.disabled = true;
      dom.idleLayer.style.display = "none";
      renderHud();
      startTimer();
      startAudioLoop();
      await unlockAudio();
    }

    function shufflePositions() {
      const rect = dom.arena.getBoundingClientRect();
      const width = Math.max(320, rect.width || dom.arena.clientWidth || 320);
      const height = Math.max(360, rect.height || dom.arena.clientHeight || 420);
      const pad = HIT_RADIUS + 18;
      const minDistance = clamp(Math.min(width, height) * 0.18, 58, 118);
      const points = [];

      MEMBERS.forEach(() => {
        let point = null;

        for (let attempt = 0; attempt < 160; attempt += 1) {
          const candidate = {
            x: randomBetween(pad, width - pad),
            y: randomBetween(pad, height - pad)
          };

          if (points.every((existing) => Math.hypot(candidate.x - existing.x, candidate.y - existing.y) >= minDistance)) {
            point = candidate;
            break;
          }
        }

        points.push(point || {
          x: randomBetween(pad, width - pad),
          y: randomBetween(pad, height - pad)
        });
      });

      state.positions = points;
    }

    function handlePointerMove(event) {
      const point = getArenaPoint(event);
      if (!point) return;

      state.pointer = point;
      dom.cursorWave.style.left = `${point.x}px`;
      dom.cursorWave.style.top = `${point.y}px`;

      if (state.isRunning) {
        dom.cursorWave.classList.add("is-visible");
        setVolumesFromPointer(point);
      }
    }

    function handlePointerLeave() {
      state.pointer = null;
      muteTargets();
      dom.cursorWave.classList.remove("is-visible");
    }

    function handleArenaClick(event) {
      if (!state.isRunning) return;

      const point = getArenaPoint(event);
      if (!point) return;

      setVolumesFromPointer(point);
      const hitIndex = findHitMemberIndex(point);

      if (hitIndex === -1) {
        showClickNote(point, EMPTY_CLICK_TEXT);
        return;
      }

      if (hitIndex !== state.currentIndex) {
        failGame(point);
        return;
      }

      handleCorrectHit(point);
    }

    function findHitMemberIndex(point) {
      let nearestIndex = -1;
      let nearestDistance = Infinity;

      state.positions.forEach((hiddenPoint, index) => {
        const distance = Math.hypot(point.x - hiddenPoint.x, point.y - hiddenPoint.y);
        if (distance <= HIT_RADIUS && distance < nearestDistance) {
          nearestIndex = index;
          nearestDistance = distance;
        }
      });

      return nearestIndex;
    }

    function handleCorrectHit(point) {
      const member = MEMBERS[state.currentIndex];
      showFoundMember(member, point);
      playHitSound(member);
      state.currentIndex += 1;

      if (state.currentIndex >= MEMBERS.length) {
        completeGame();
        return;
      }

      shufflePositions();
      renderHud();
      renderMemberStrip();
      setVolumesFromPointer(point);
    }

    function failGame(point) {
      state.isRunning = false;
      state.isComplete = false;
      stopTimer();
      stopHintAudio();
      renderTimer(0);
      navigator.vibrate?.([80, 40, 120]);
      playErrorSound();
      showClickNote(point, "点错了");
      openInfoModal("哔哔哔——请从头开始寻找！", "进度和计时已清零，下一局仍然从 Lily 开始。");
      resetRun();
    }

    function completeGame() {
      state.isRunning = false;
      state.isComplete = true;
      state.finalTime = state.elapsedMs;
      stopTimer();
      stopHintAudio();
      renderTimer(state.finalTime);
      renderHud();
      renderMemberStrip();
      dom.startBtn.disabled = false;
      dom.cursorWave.classList.remove("is-visible");
      dom.idleLayer.style.display = "grid";
      playCompleteSound();

      if (qualifiesForTop100(state.finalTime)) {
        openScoreModal(state.finalTime);
      } else {
        openInfoModal("恭喜这位恩瑟找齐全部成员！", `本局用时 ${formatTime(state.finalTime)}，距离前 100 名还差一点点。`);
      }
    }

    function renderHud() {
      const target = MEMBERS[Math.min(state.currentIndex, MEMBERS.length - 1)];
      dom.targetLabel.textContent = state.isComplete ? "已找齐" : target.name;
      dom.progressLabel.textContent = `${Math.min(state.currentIndex, MEMBERS.length)} / ${MEMBERS.length}`;

      if (!state.isRunning && !state.isComplete && !state.audioReady) {
        dom.soundLabel.textContent = "待开始";
      }
    }

    function renderMemberStrip() {
      dom.memberStrip.innerHTML = MEMBERS.map((member, index) => {
        const className = [
          "member-step",
          index < state.currentIndex ? "is-found" : "",
          index === state.currentIndex && !state.isComplete ? "is-current" : ""
        ].filter(Boolean).join(" ");

        return `
          <div class="${className}" style="--step-color: ${member.color}">
            <span>${index + 1}. ${member.name}</span>
          </div>
        `;
      }).join("");
    }

    function showFoundMember(member, point) {
      const pop = document.createElement("div");
      pop.className = "found-pop";
      pop.style.left = `${point.x}px`;
      pop.style.top = `${point.y}px`;
      pop.style.setProperty("--avatar-bg", member.color);
      pop.innerHTML = `
        <div class="found-frame">
          <div class="fallback-avatar">${member.name.slice(0, 1)}</div>
          <img src="${member.image}" alt="${member.name}">
          <div class="found-name">${member.name}</div>
        </div>
      `;

      const image = pop.querySelector("img");
      image.addEventListener("error", () => {
        image.remove();
      });

      image.addEventListener("load", () => {
        const fallback = pop.querySelector(".fallback-avatar");
        if (fallback) fallback.style.display = "none";
      });

      dom.arena.appendChild(pop);
      pop.addEventListener("animationend", () => pop.remove());
    }

    function showClickNote(point, text) {
      const note = document.createElement("div");
      note.className = "click-note";
      note.style.left = `${point.x}px`;
      note.style.top = `${point.y}px`;
      note.textContent = text;
      dom.arena.appendChild(note);
      note.addEventListener("animationend", () => note.remove());
    }

    function playHitSound(member) {
      playFileOnce(member.hitSound, 0.95, () => playGeneratedHit(member.tone));
    }

    function playCompleteSound() {
      playFileOnce("nmixx.mp3", 1, playGeneratedComplete);
    }

    function playStartupSoundNow() {
      const audio = getStartupAudio();
      try {
        audio.pause();
        audio.currentTime = 0;
      } catch (error) {
        audio.load();
      }
      audio.volume = 1;
      audio.muted = false;
      audio.playsInline = true;

      const playPromise = audio.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise
          .then(() => {
            dom.soundLabel.textContent = "启动音播放中";
          })
          .catch((error) => {
            dom.soundLabel.textContent = `启动音失败: ${error.name || "未知"}`;
        });
      }
    }

    function playStartupSound(force = false) {
      const now = performance.now();
      if (!force && now - state.lastStartupSoundAt < 900) return;
      state.lastStartupSoundAt = now;
      playStartupSoundNow();
    }

    function getStartupAudio() {
      if (!state.startupAudio && dom.startupAudioEl) {
        state.startupAudio = dom.startupAudioEl;
      }

      if (!state.startupAudio) {
        state.startupAudio = new Audio("nmixx.mp3");
      }

      const audio = state.startupAudio;
      audio.preload = "auto";
      audio.volume = 1;
      audio.muted = false;
      audio.setAttribute("playsinline", "");
      audio.setAttribute("webkit-playsinline", "");

      return audio;
    }

    function playErrorSound() {
      playFileOnce("error.mp3", 0.9, playGeneratedError);
    }

    function playUnlockTone() {
      if (!state.audioContext || !state.masterGain) return;

      const now = state.audioContext.currentTime;
      playTone(523, now, 0.08, 0.08);
      playTone(784, now + 0.07, 0.08, 0.08);
    }

    function playFileOnce(src, volume, fallback) {
      const audio = new Audio(src);
      audio.preload = "auto";
      audio.volume = volume;
      audio.muted = false;
      audio.setAttribute("playsinline", "");
      audio.setAttribute("webkit-playsinline", "");
      state.oneShotAudios.push(audio);

      let settled = false;

      const finishWithFallback = () => {
        if (settled) return;
        settled = true;
        fallback();
      };

      const markPlaying = () => {
        settled = true;
      };

      const cleanup = () => {
        state.oneShotAudios = state.oneShotAudios.filter((item) => item !== audio);
      };

      window.setTimeout(finishWithFallback, 700);
      audio.addEventListener("playing", markPlaying, { once: true });
      audio.addEventListener("error", finishWithFallback, { once: true });
      audio.addEventListener("ended", cleanup, { once: true });

      const playPromise = audio.play();
      if (playPromise && typeof playPromise.then === "function") {
        playPromise.then(markPlaying).catch(finishWithFallback);
      }
    }

    function playGeneratedHit(baseTone) {
      if (!state.audioContext || !state.masterGain) return;

      const now = state.audioContext.currentTime;
      [0, 0.08, 0.16].forEach((offset, index) => {
        playTone(baseTone * [1, 1.25, 1.5][index], now + offset, 0.07, 0.16);
      });
    }

    function playGeneratedComplete() {
      if (!state.audioContext || !state.masterGain) return;

      const now = state.audioContext.currentTime;
      [392, 494, 587, 784, 988].forEach((tone, index) => {
        playTone(tone, now + index * 0.08, 0.12, 0.18);
      });
    }

    function playGeneratedError() {
      if (!state.audioContext || !state.masterGain) return;

      const now = state.audioContext.currentTime;
      playTone(150, now, 0.12, 0.26, "sawtooth");
      playTone(92, now + 0.08, 0.12, 0.24, "sawtooth");
    }

    function playTone(frequency, startAt, duration, volume, type = "triangle") {
      const oscillator = state.audioContext.createOscillator();
      const gain = state.audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startAt);
      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
      oscillator.connect(gain);
      gain.connect(state.masterGain);
      oscillator.start(startAt);
      oscillator.stop(startAt + duration + 0.03);
    }

    function getArenaPoint(event) {
      const rect = dom.arena.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      if (x < 0 || y < 0 || x > rect.width || y > rect.height) {
        return null;
      }

      return { x, y };
    }

    function loadLocalScores() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return sanitizeScores(parsed);
      } catch (error) {
        return [];
      }
    }

    function saveLocalScores(scores) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sanitizeScores(scores).slice(0, MAX_SCORES)));
    }

    function getCachedScores() {
      if (state.leaderboardScores.length) {
        return state.leaderboardScores;
      }

      state.leaderboardScores = loadLocalScores();
      return state.leaderboardScores;
    }

    async function fetchSharedScores() {
      const response = await fetch(LEADERBOARD_API, {
        method: "GET",
        headers: { "Accept": "application/json" },
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`Leaderboard GET failed: ${response.status}`);
      }

      const payload = await response.json();
      const scores = sanitizeScores(payload.scores || []);
      state.leaderboardScores = scores;
      state.leaderboardOnline = true;
      saveLocalScores(scores);
      return scores;
    }

    async function postSharedScore(id, time) {
      const response = await fetch(LEADERBOARD_API, {
        method: "POST",
        headers: {
          "Accept": "application/json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ id, time })
      });

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || `Leaderboard POST failed: ${response.status}`);
      }

      const scores = sanitizeScores(payload.scores || []);
      state.leaderboardScores = scores;
      state.leaderboardOnline = true;
      saveLocalScores(scores);

      return {
        scores,
        accepted: payload.accepted !== false,
        previousBest: payload.previousBest
      };
    }

    function sanitizeScores(scores) {
      const byId = new Map();

      if (!Array.isArray(scores)) return [];

      scores.forEach((score) => {
        const id = String(score.id || "").trim();
        const time = Number(score.time);
        if (!id || !Number.isFinite(time) || time < 0) return;

        const normalizedId = id.toLocaleLowerCase();
        const existing = byId.get(normalizedId);

        if (!existing || time < existing.time) {
          byId.set(normalizedId, {
            id,
            time,
            createdAt: score.createdAt || new Date().toISOString()
          });
        }
      });

      return Array.from(byId.values()).sort((a, b) => a.time - b.time).slice(0, MAX_SCORES);
    }

    function qualifiesForTop100(time) {
      const scores = getCachedScores();
      return scores.length < MAX_SCORES || time < scores[scores.length - 1].time;
    }

    async function submitScore() {
      const id = dom.playerName.value.trim();

      if (!id) {
        dom.formError.textContent = "请填写昵称。";
        dom.playerName.focus();
        return;
      }

      dom.submitScoreBtn.disabled = true;
      dom.formError.textContent = "正在上传成绩...";
      const scores = getCachedScores();
      const normalizedId = id.toLocaleLowerCase();
      const previous = scores.find((score) => score.id.toLocaleLowerCase() === normalizedId);

      if (previous && previous.time <= state.finalTime) {
        dom.formError.textContent = `该 ID 已有更快成绩：${formatTime(previous.time)}。`;
        dom.submitScoreBtn.disabled = false;
        return;
      }

      try {
        const result = await postSharedScore(id, state.finalTime);

        if (!result.accepted && result.previousBest) {
          dom.formError.textContent = `该 ID 已有更快成绩：${formatTime(result.previousBest)}。`;
          return;
        }

        renderScores(result.scores);
        closeModal();
      } catch (error) {
        scores.push({
          id,
          time: state.finalTime,
          createdAt: new Date().toISOString()
        });
        state.leaderboardScores = sanitizeScores(scores);
        saveLocalScores(state.leaderboardScores);
        renderScores(state.leaderboardScores);
        dom.formError.textContent = "线上榜单暂不可用，成绩已先保存到本机。";
      } finally {
        dom.submitScoreBtn.disabled = false;
      }
    }

    async function renderScores(scores = null) {
      const currentScores = scores || getCachedScores();

      if (!currentScores.length) {
        dom.scoreList.innerHTML = '<div class="empty-score">还没有记录，第一位恩瑟正在路上。</div>';
      } else {
        dom.scoreList.innerHTML = currentScores.map((score, index) => `
          <div class="score-row">
            <div class="score-rank">${index + 1}</div>
            <div class="score-id" title="${escapeHtml(score.id)}">${escapeHtml(score.id)}</div>
            <div class="score-time">${formatTime(score.time)}</div>
          </div>
        `).join("");
      }

      if (!scores && !state.leaderboardOnline) {
        try {
          const sharedScores = await fetchSharedScores();
          renderScores(sharedScores);
        } catch (error) {
          state.leaderboardOnline = false;
        }
      }
    }

    function openScoreModal(time) {
      state.modalMode = "score";
      dom.modalTitle.textContent = "恭喜这位恩瑟找齐全部成员！";
      dom.modalMessage.textContent = `本局用时 ${formatTime(time)}。`;
      dom.nameForm.classList.add("is-visible");
      dom.submitScoreBtn.style.display = "inline-flex";
      dom.modalCloseBtn.textContent = "稍后再说";
      dom.formError.textContent = "";
      dom.playerName.value = "";
      dom.modalBackdrop.classList.add("is-open");
      window.setTimeout(() => dom.playerName.focus(), 80);
    }

    function openInfoModal(title, message) {
      state.modalMode = "info";
      dom.modalTitle.textContent = title;
      dom.modalMessage.textContent = message;
      dom.nameForm.classList.remove("is-visible");
      dom.submitScoreBtn.style.display = "none";
      dom.modalCloseBtn.textContent = "知道了";
      dom.formError.textContent = "";
      dom.modalBackdrop.classList.add("is-open");
    }

    function closeModal() {
      dom.modalBackdrop.classList.remove("is-open");
    }

    function randomBetween(min, max) {
      return min + Math.random() * Math.max(0, max - min);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function bindEvents() {
      dom.soundUnlockBtn.addEventListener("pointerdown", primeAudioFromGesture);
      dom.soundUnlockBtn.addEventListener("click", hardUnlockAudio);
      dom.startBtn.addEventListener("touchstart", playStartupSound, { passive: true });
      dom.startBtn.addEventListener("mousedown", playStartupSound);
      dom.startBtn.addEventListener("pointerdown", playStartupSound);
      dom.startBtn.addEventListener("pointerdown", primeAudioFromGesture);
      dom.startBtn.addEventListener("click", startGame);
      dom.restartBtn.addEventListener("click", () => resetRun({ clearPops: true }));
      dom.arena.addEventListener("pointerdown", handlePointerMove);
      dom.arena.addEventListener("pointermove", handlePointerMove);
      dom.arena.addEventListener("pointerleave", handlePointerLeave);
      dom.arena.addEventListener("pointercancel", handlePointerLeave);
      dom.arena.addEventListener("pointerup", handleArenaClick);
      dom.submitScoreBtn.addEventListener("click", submitScore);
      dom.modalCloseBtn.addEventListener("click", closeModal);
      dom.nameForm.addEventListener("submit", (event) => {
        event.preventDefault();
        submitScore();
      });
      dom.playerName.addEventListener("input", () => {
        dom.formError.textContent = "";
      });
      dom.modalBackdrop.addEventListener("click", (event) => {
        if (event.target === dom.modalBackdrop && state.modalMode !== "score") {
          closeModal();
        }
      });
      window.addEventListener("resize", () => {
        if (!state.isRunning) {
          shufflePositions();
        }
      });
      window.addEventListener("storage", (event) => {
        if (event.key === STORAGE_KEY) {
          renderScores();
        }
      });
    }

    function boot() {
      prepareHintAudio();
      bindEvents();
      shufflePositions();
      renderHud();
      renderMemberStrip();
      renderScores();
    }

    boot();
  </script>
</body>
</html>
