<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>寻找糯米香香吧 ！</title>
  <style>
    :root {
      --ink: #25456c;
      --muted: #6c7da3;
      --line: rgba(255, 255, 255, 0.62);
      --paper: #fff8ff;
      --mint: #a7f5e6;
      --mint-strong: #6feed8;
      --sky: #a9e7ff;
      --peach: #ffc9ab;
      --pink: #ffb6d6;
      --lemon: #fff5a8;
      --lavender: #c9b8ff;
      --blueberry: #6d8cff;
      --shadow: 0 22px 52px rgba(76, 88, 170, 0.22);
      --radius: 8px;
      font-family:
        "Inter", "Pretendard", "Noto Sans SC", "Microsoft YaHei",
        system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 245, 168, 0.86), transparent 28%),
        radial-gradient(circle at 84% 14%, rgba(255, 182, 214, 0.72), transparent 30%),
        radial-gradient(circle at 72% 78%, rgba(167, 245, 230, 0.74), transparent 28%),
        linear-gradient(135deg, #fff4c9 0%, #ffc8dd 24%, #b8eaff 50%, #cab8ff 74%, #fff0bd 100%);
      background-attachment: fixed;
      background-size: 100% 100%;
    }

    body {
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0 18%, rgba(255, 255, 255, 0.25) 18% 19%, transparent 19% 42%, rgba(255, 255, 255, 0.20) 42% 43%, transparent 43%),
        linear-gradient(22deg, transparent 0 34%, rgba(255, 204, 226, 0.42) 34% 35%, transparent 35% 70%, rgba(169, 231, 255, 0.38) 70% 71%, transparent 71%);
      mix-blend-mode: screen;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 30px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.9fr);
      gap: 16px;
      align-items: end;
      margin-bottom: 16px;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: 0;
      color: #25456c;
      text-shadow: 0 6px 20px rgba(255, 255, 255, 0.82);
      background: linear-gradient(90deg, #4059d8 0%, #ff74bd 36%, #00c9c8 68%, #ffb743 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .title-block p {
      max-width: 730px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-self: stretch;
    }

    .hud-item {
      min-height: 68px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 28px rgba(84, 101, 190, 0.16);
    }

    .hud-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 6px;
    }

    .hud-value {
      display: block;
      font-size: 1.18rem;
      font-weight: 800;
      line-height: 1.1;
      color: #22323a;
      overflow-wrap: anywhere;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 16px;
      align-items: stretch;
    }

    .game-column {
      min-width: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .sound-guide {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      width: fit-content;
      max-width: 100%;
      margin: -2px 0 14px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 999px;
      color: #40508f;
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 30px rgba(91, 101, 190, 0.14);
      font-size: 0.9rem;
      font-weight: 850;
      line-height: 1.35;
    }

    .sound-guide-btn {
      min-height: 36px;
      padding: 0 14px;
      box-shadow: 0 6px 0 rgba(127, 165, 232, 0.52), 0 12px 20px rgba(89, 116, 192, 0.14);
    }

    .guide-arrow {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 22px;
      color: #ff73b7;
      font-size: 1.4rem;
      line-height: 1;
      animation: guideNudge 900ms ease-in-out infinite;
    }

    @keyframes guideNudge {
      0%,
      100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(7px);
      }
    }

    .primary-btn,
    .ghost-btn,
    .modal-btn {
      min-height: 44px;
      padding: 0 18px;
      border-radius: var(--radius);
      font-weight: 800;
      letter-spacing: 0;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .primary-btn,
    .modal-btn {
      color: #153438;
      background: linear-gradient(135deg, #fff27b, #ff9bc8 42%, #7bf2e8);
      box-shadow: 0 8px 0 #e978b2, 0 16px 26px rgba(255, 134, 191, 0.28);
    }

    .ghost-btn {
      color: #3a4d84;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 0 rgba(127, 165, 232, 0.52), 0 14px 22px rgba(89, 116, 192, 0.15);
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .modal-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn:active,
    .ghost-btn:active,
    .modal-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 rgba(61, 169, 145, 0.5), 0 8px 16px rgba(80, 110, 120, 0.08);
    }

    .stage-wrap {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.44);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .arena {
      position: relative;
      height: clamp(420px, 64vh, 690px);
      min-height: 420px;
      touch-action: none;
      user-select: none;
      cursor: crosshair;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 244, 168, 0.95), transparent 22%),
        radial-gradient(circle at 76% 22%, rgba(255, 150, 205, 0.65), transparent 26%),
        linear-gradient(155deg, #fff7c6 0%, #ffc8de 18%, #b7eaff 43%, #9aa9ff 68%, #ffd5ef 100%);
    }

    .arena::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-radial-gradient(circle at 52% 42%, rgba(255, 255, 255, 0.32) 0 1px, transparent 1px 18px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px);
      background-size: 100% 100%, 36px 36px, 36px 36px;
      mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 88%, transparent);
    }

    .arena::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 2px dashed rgba(255, 255, 255, 0.52);
      border-radius: 6px;
      pointer-events: none;
    }

    .ocean-scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .ocean-scene::before {
      content: "";
      position: absolute;
      left: -12%;
      right: -12%;
      bottom: -18%;
      height: 52%;
      background:
        linear-gradient(transparent 0 38%, rgba(255, 255, 255, 0.38) 39% 42%, transparent 43% 100%),
        repeating-linear-gradient(170deg, rgba(255, 255, 255, 0.18) 0 2px, transparent 2px 24px),
        linear-gradient(180deg, rgba(107, 220, 237, 0.05), rgba(78, 119, 226, 0.32));
      border-radius: 50% 50% 0 0;
      transform: rotate(-3deg);
    }

    .whale {
      position: absolute;
      right: 7%;
      bottom: 18%;
      width: min(42vw, 420px);
      aspect-ratio: 1.9;
      border-radius: 58% 48% 48% 56%;
      background:
        radial-gradient(circle at 72% 40%, #1e315a 0 2%, transparent 2.4%),
        linear-gradient(120deg, rgba(255, 243, 150, 0.96), rgba(255, 142, 201, 0.86) 28%, rgba(108, 240, 231, 0.88) 56%, rgba(128, 147, 255, 0.92));
      box-shadow: 0 0 36px rgba(255, 255, 255, 0.68), 0 28px 70px rgba(84, 84, 190, 0.28);
      opacity: 0.76;
      transform: rotate(-13deg);
    }

    .whale::before {
      content: "";
      position: absolute;
      right: -18%;
      top: 20%;
      width: 34%;
      height: 62%;
      background: linear-gradient(135deg, #8fdfff, #fba6d2 58%, #fff3a6);
      clip-path: polygon(0 48%, 72% 0, 100% 18%, 54% 50%, 100% 84%, 72% 100%);
      filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.66));
    }

    .whale::after {
      content: "";
      position: absolute;
      left: 20%;
      bottom: -20%;
      width: 30%;
      height: 36%;
      border-radius: 50%;
      background: linear-gradient(140deg, rgba(174, 255, 245, 0.88), rgba(255, 194, 221, 0.66));
      clip-path: polygon(14% 0, 100% 30%, 18% 100%);
    }

    .sailboat {
      position: absolute;
      left: 18%;
      bottom: 9%;
      width: 190px;
      height: 110px;
      opacity: 0.82;
      filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.72));
    }

    .sailboat::before {
      content: "";
      position: absolute;
      left: 25px;
      bottom: 12px;
      width: 130px;
      height: 34px;
      border: 2px solid rgba(255, 255, 255, 0.86);
      border-top: 0;
      border-radius: 0 0 80px 80px;
      background: rgba(150, 229, 255, 0.15);
    }

    .sailboat::after {
      content: "";
      position: absolute;
      left: 86px;
      bottom: 44px;
      width: 76px;
      height: 68px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(255, 183, 222, 0.42));
      clip-path: polygon(0 100%, 0 0, 100% 100%);
      box-shadow: -38px 24px 0 rgba(255, 245, 168, 0.44);
    }

    .jelly {
      position: absolute;
      width: 74px;
      height: 108px;
      opacity: 0.72;
      filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.72));
    }

    .jelly::before {
      content: "";
      position: absolute;
      inset: 0 0 48px 0;
      border-radius: 48% 48% 42% 42%;
      background: linear-gradient(135deg, rgba(255, 244, 168, 0.72), rgba(255, 154, 211, 0.7), rgba(126, 238, 247, 0.65));
      border: 1px solid rgba(255, 255, 255, 0.74);
    }

    .jelly::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 0;
      height: 64px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.72) 2px, transparent 2px 13px),
        linear-gradient(90deg, transparent 8px, rgba(255, 215, 239, 0.84) 8px 10px, transparent 10px 22px);
      border-radius: 0 0 40% 40%;
    }

    .jelly-a {
      right: 12%;
      top: 12%;
      transform: rotate(8deg);
    }

    .jelly-b {
      left: 8%;
      top: 24%;
      transform: scale(0.76) rotate(-12deg);
    }

    .starfield {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.96) 0 2px, transparent 3px),
        radial-gradient(circle at 34% 12%, rgba(255, 245, 168, 0.92) 0 2px, transparent 3px),
        radial-gradient(circle at 57% 31%, rgba(255, 255, 255, 0.92) 0 2px, transparent 3px),
        radial-gradient(circle at 86% 62%, rgba(255, 221, 244, 0.95) 0 2px, transparent 3px),
        radial-gradient(circle at 44% 82%, rgba(169, 255, 247, 0.96) 0 2px, transparent 3px);
    }

    .arena-idle {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
      padding: 24px;
      z-index: 3;
    }

    .idle-panel {
      display: inline-grid;
      gap: 10px;
      width: min(460px, 100%);
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 214, 235, 0.62)),
        linear-gradient(90deg, rgba(167, 245, 230, 0.32), rgba(255, 245, 168, 0.25));
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(86, 94, 190, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.42);
    }

    .idle-title {
      font-size: 1.2rem;
      font-weight: 900;
    }

    .idle-text {
      color: var(--muted);
      line-height: 1.7;
    }

    .cursor-wave {
      position: absolute;
      left: 0;
      top: 0;
      width: 72px;
      height: 72px;
      border: 2px solid rgba(61, 169, 145, 0.62);
      border-radius: 50%;
      pointer-events: none;
      transform: translate3d(-9999px, -9999px, 0) translate(-50%, -50%);
      opacity: 0;
      z-index: 5;
      transition: none;
      will-change: transform, opacity;
    }

    .cursor-wave::before,
    .cursor-wave::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255, 135, 168, 0.55);
      border-radius: 50%;
    }

    .cursor-wave::after {
      inset: 22px;
      border-color: rgba(93, 152, 214, 0.55);
    }

    .cursor-wave.is-visible {
      opacity: 1;
      animation: none;
    }

    @keyframes breathe {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(0.92);
      }
      50% {
        transform: translate(-50%, -50%) scale(1.06);
      }
    }

    .found-pop {
      position: absolute;
      width: 118px;
      height: 142px;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%) scale(0.6);
      pointer-events: none;
      z-index: 10;
      animation: popMember 1180ms cubic-bezier(.18, .95, .25, 1) forwards;
    }

    .found-frame {
      position: relative;
      width: 104px;
      height: 124px;
      border: 2px solid #293d44;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow:
        5px 5px 0 rgba(36, 54, 61, 0.18),
        0 16px 28px rgba(45, 70, 80, 0.18);
    }

    .found-frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
      background: #fff;
    }

    .fallback-avatar {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #20333a;
      font-size: 2rem;
      font-weight: 950;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.45) 50%, transparent 50%),
        linear-gradient(rgba(255, 255, 255, 0.35) 50%, transparent 50%),
        var(--avatar-bg, var(--mint));
      background-size: 12px 12px;
    }

    .found-name {
      position: absolute;
      left: 50%;
      bottom: -9px;
      transform: translateX(-50%);
      min-width: 86px;
      padding: 5px 9px;
      border: 1px solid #293d44;
      border-radius: 999px;
      background: #fff;
      color: #20333a;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 900;
      z-index: 3;
    }

    @keyframes popMember {
      0% {
        opacity: 0;
        transform: translate(-50%, -42%) scale(0.62) rotate(-4deg);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -58%) scale(1.08) rotate(2deg);
      }
      78% {
        opacity: 1;
        transform: translate(-50%, -58%) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -72%) scale(0.92) rotate(0deg);
      }
    }

    .click-note {
      position: absolute;
      min-width: 54px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.9);
      font-size: 0.78rem;
      font-weight: 800;
      text-align: center;
      pointer-events: none;
      z-index: 8;
      animation: fadeNote 700ms ease forwards;
    }

    @keyframes fadeNote {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(-18px);
      }
    }

    .member-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(12px);
    }

    .member-step {
      position: relative;
      min-width: 0;
      min-height: 58px;
      display: grid;
      place-items: center;
      padding: 8px 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #566a72;
      background: rgba(255, 255, 255, 0.7);
      font-size: 0.78rem;
      font-weight: 850;
      text-align: center;
      overflow: hidden;
    }

    .member-step::before {
      content: "";
      position: absolute;
      top: 7px;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--step-color, var(--mint));
      box-shadow: 14px 0 0 rgba(255, 255, 255, 0.7), -14px 0 0 rgba(255, 255, 255, 0.7);
      opacity: 0.95;
    }

    .member-step span {
      position: relative;
      top: 8px;
      overflow-wrap: anywhere;
    }

    .member-step.is-current {
      border-color: #45b99f;
      color: #183f3d;
      background: #ecfff8;
      box-shadow: inset 0 -4px 0 rgba(116, 215, 191, 0.35);
    }

    .member-step.is-found {
      border-color: #f2b5c5;
      color: #52303c;
      background: #fff1f5;
    }

    .leaderboard {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.52);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .leaderboard-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(105deg, rgba(255, 245, 168, 0.8), rgba(255, 182, 214, 0.72) 46%, rgba(169, 231, 255, 0.82));
    }

    .leaderboard-head h2 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0;
    }

    .leaderboard-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .score-list {
      max-height: 604px;
      overflow: auto;
      scrollbar-width: thin;
    }

    .score-row {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 92px;
      gap: 8px;
      align-items: center;
      min-height: 48px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(216, 228, 229, 0.74);
      background: rgba(255, 255, 255, 0.56);
    }

    .score-row:nth-child(3n + 1) {
      background: rgba(255, 182, 214, 0.34);
    }

    .score-row:nth-child(3n + 2) {
      background: rgba(169, 231, 255, 0.36);
    }

    .score-rank {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.84);
      font-weight: 950;
      color: #264045;
    }

    .score-id {
      min-width: 0;
      color: #24373d;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-time {
      color: #2e5d55;
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      text-align: right;
    }

    .empty-score {
      padding: 22px 14px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(28, 40, 45, 0.36);
      backdrop-filter: blur(7px);
      z-index: 100;
    }

    .modal-backdrop.is-open {
      display: grid;
    }

    .modal {
      width: min(430px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffefd;
      box-shadow: 0 22px 56px rgba(24, 39, 46, 0.22);
      overflow: hidden;
      animation: modalIn 180ms ease both;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-top {
      min-height: 86px;
      padding: 18px;
      background:
        linear-gradient(90deg, rgba(223, 246, 239, 0.92), rgba(255, 226, 216, 0.88));
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .modal-body {
      padding: 18px;
    }

    .modal-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .name-form {
      display: none;
      gap: 10px;
      margin-top: 16px;
    }

    .name-form.is-visible {
      display: grid;
    }

    .name-form label {
      color: #2d444b;
      font-weight: 900;
    }

    .name-form input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid #bfd2d4;
      border-radius: var(--radius);
      color: var(--ink);
      background: #fbfffe;
      outline: none;
    }

    .name-form input:focus {
      border-color: #45b99f;
      box-shadow: 0 0 0 4px rgba(116, 215, 191, 0.20);
    }

    .form-error {
      min-height: 20px;
      color: #bf3f5d;
      font-size: 0.86rem;
      font-weight: 800;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .tiny-footer {
      margin-top: 10px;
      color: #6d8188;
      font-size: 0.78rem;
      line-height: 1.5;
      text-align: center;
    }

    /* Macaron ocean refresh: the stage is a dreamy NMIXX navigation chart. */
    :root {
      --ink: #26396f;
      --muted: #6575a6;
      --line: rgba(255, 255, 255, 0.68);
      --paper: #fff9ff;
      --mint: #8cf5ea;
      --mint-strong: #4cebd8;
      --sky: #8fdcff;
      --peach: #ffc9a9;
      --pink: #ff9fd1;
      --lemon: #fff29a;
      --lavender: #cbb8ff;
      --blueberry: #6f8dff;
      --deep-sea: #5265b7;
      --shadow: 0 24px 58px rgba(79, 94, 180, 0.26);
      --radius: 8px;
    }

    html,
    body {
      background:
        linear-gradient(180deg, rgba(255, 246, 255, 0.88), rgba(222, 244, 255, 0.74)),
        url("ocean-whale-style.png") center 34% / cover fixed,
        linear-gradient(135deg, #fff2b8 0%, #ffacd0 27%, #9be8ff 52%, #b9a8ff 76%, #fff0c2 100%);
    }

    body::before {
      background:
        radial-gradient(ellipse at 38% 18%, rgba(255, 245, 174, 0.44), transparent 34%),
        linear-gradient(115deg, transparent 0 18%, rgba(255, 255, 255, 0.24) 18% 19%, transparent 19% 43%, rgba(255, 199, 226, 0.22) 43% 44%, transparent 44%),
        repeating-linear-gradient(104deg, rgba(255, 255, 255, 0.16) 0 1px, transparent 1px 36px);
      mix-blend-mode: screen;
      opacity: 0.92;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 22%, rgba(255, 255, 255, 0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 27% 86%, rgba(140, 245, 234, 0.7) 0 1px, transparent 2px),
        radial-gradient(circle at 76% 18%, rgba(255, 242, 154, 0.82) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 72%, rgba(255, 159, 209, 0.72) 0 1px, transparent 2px);
      background-size: 210px 210px, 250px 250px, 180px 180px, 230px 230px;
      opacity: 0.78;
    }

    .app {
      position: relative;
      padding-top: 28px;
    }

    .topbar {
      align-items: stretch;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: var(--radius);
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.72), rgba(255, 216, 236, 0.38)),
        linear-gradient(90deg, rgba(140, 245, 234, 0.24), rgba(255, 242, 154, 0.2));
      box-shadow: 0 18px 46px rgba(86, 103, 182, 0.2);
      backdrop-filter: blur(18px);
    }

    .title-block {
      position: relative;
      padding: 8px 4px 4px;
    }

    .title-block::before {
      content: "NMIXX NAVIGATION";
      display: inline-grid;
      place-items: center;
      min-height: 24px;
      margin-bottom: 8px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      color: #4659a2;
      background: rgba(255, 255, 255, 0.6);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .title-block h1 {
      max-width: 760px;
      color: transparent;
      background: linear-gradient(92deg, #6659f2 0%, #ff73ba 32%, #5ef2e2 62%, #fff06d 88%);
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 8px 18px rgba(255, 255, 255, 0.92));
    }

    .title-block p {
      color: #526399;
      font-weight: 700;
    }

    .hud-item,
    .leaderboard,
    .stage-wrap,
    .idle-panel {
      border-color: rgba(255, 255, 255, 0.72);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(235, 249, 255, 0.5)),
        linear-gradient(90deg, rgba(255, 178, 218, 0.14), rgba(139, 245, 232, 0.12));
      box-shadow: 0 18px 44px rgba(72, 91, 174, 0.18), inset 0 0 0 1px rgba(255, 255, 255, 0.34);
    }

    .hud-item {
      position: relative;
      overflow: hidden;
    }

    .hud-item::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 8px;
      height: 2px;
      background: linear-gradient(90deg, var(--pink), var(--mint), var(--lemon));
      opacity: 0.72;
    }

    .hud-label {
      color: #7180ae;
      font-weight: 850;
    }

    .hud-value {
      color: #253065;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.72);
    }

    .controls {
      margin: 16px 0 10px;
    }

    .primary-btn,
    .modal-btn {
      background: linear-gradient(135deg, #fff47f 0%, #ff8fc4 38%, #75f1e4 76%, #9db0ff 100%);
      color: #253065;
      box-shadow: 0 7px 0 #e67bb8, 0 18px 34px rgba(255, 139, 197, 0.3);
    }

    .ghost-btn {
      color: #3f4f95;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(239, 250, 255, 0.62)),
        linear-gradient(90deg, rgba(255, 159, 209, 0.14), rgba(140, 245, 234, 0.16));
      box-shadow: 0 7px 0 rgba(108, 142, 220, 0.45), 0 14px 24px rgba(78, 102, 180, 0.16);
    }

    .sound-guide {
      border-color: rgba(255, 255, 255, 0.78);
      color: #394b96;
      background:
        linear-gradient(110deg, rgba(255, 255, 255, 0.78), rgba(255, 225, 242, 0.58)),
        linear-gradient(90deg, rgba(255, 242, 154, 0.2), rgba(140, 245, 234, 0.24));
    }

    .stage-wrap {
      position: relative;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.34), rgba(218, 247, 255, 0.28));
    }

    .stage-wrap::before {
      content: "";
      position: absolute;
      inset: -1px;
      pointer-events: none;
      border-radius: var(--radius);
      padding: 1px;
      background: linear-gradient(120deg, rgba(255, 242, 154, 0.8), rgba(255, 159, 209, 0.8), rgba(140, 245, 234, 0.9), rgba(179, 165, 255, 0.82));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      z-index: 20;
    }

    .arena {
      background:
        linear-gradient(180deg, rgba(255, 236, 248, 0.48), rgba(136, 226, 255, 0.2)),
        url("ocean-whale-style.png") center 40% / cover,
        radial-gradient(ellipse at 22% 20%, rgba(255, 244, 168, 0.86), transparent 30%),
        linear-gradient(155deg, #ffe7f4 0%, #ffb6d8 20%, #9fe9ff 48%, #9faeff 70%, #fff0b9 100%);
    }

    .arena::before {
      background:
        conic-gradient(from 18deg at 52% 45%, transparent 0 10deg, rgba(255, 255, 255, 0.18) 10deg 12deg, transparent 12deg 34deg),
        repeating-radial-gradient(circle at 52% 45%, rgba(255, 255, 255, 0.3) 0 1px, transparent 1px 34px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.14) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 44px 44px, 44px 44px;
      opacity: 0.9;
    }

    .arena::after {
      inset: 18px;
      border: 1px solid rgba(255, 255, 255, 0.68);
      box-shadow: inset 0 0 28px rgba(255, 255, 255, 0.28);
    }

    .ocean-scene {
      opacity: 0.98;
    }

    .ocean-scene::before {
      bottom: -20%;
      height: 48%;
      background:
        repeating-linear-gradient(178deg, rgba(255, 255, 255, 0.22) 0 2px, transparent 2px 26px),
        linear-gradient(180deg, rgba(140, 245, 234, 0.06), rgba(75, 99, 190, 0.34));
      animation: tideFloat 7s ease-in-out infinite;
    }

    .aurora-rings,
    .compass-ring,
    .bubble-field,
    .whale-sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .aurora-rings {
      left: 10%;
      top: -22%;
      width: 80%;
      height: 94%;
      border-radius: 50%;
      background:
        repeating-conic-gradient(from 12deg, rgba(255, 255, 255, 0.28) 0 4deg, transparent 4deg 17deg),
        conic-gradient(from 90deg, rgba(255, 242, 154, 0.28), rgba(255, 159, 209, 0.26), rgba(140, 245, 234, 0.28), rgba(178, 166, 255, 0.3), rgba(255, 242, 154, 0.28));
      mask-image: radial-gradient(ellipse, transparent 0 39%, #000 40% 42%, transparent 43% 100%);
      opacity: 0.78;
      animation: slowSpin 28s linear infinite;
    }

    .compass-ring {
      left: 50%;
      top: 48%;
      width: min(72vw, 640px);
      height: min(72vw, 640px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        conic-gradient(from -14deg, rgba(255, 255, 255, 0.72) 0 1deg, transparent 1deg 14deg),
        radial-gradient(circle, transparent 0 54%, rgba(255, 255, 255, 0.22) 55% 56%, transparent 57% 100%);
      opacity: 0.62;
      animation: compassDrift 12s ease-in-out infinite;
    }

    .bubble-field {
      background:
        radial-gradient(circle at 18% 62%, rgba(255, 255, 255, 0.72) 0 2px, transparent 3px),
        radial-gradient(circle at 24% 75%, rgba(140, 245, 234, 0.6) 0 2px, transparent 3px),
        radial-gradient(circle at 63% 16%, rgba(255, 242, 154, 0.7) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 34%, rgba(255, 255, 255, 0.68) 0 2px, transparent 3px),
        radial-gradient(circle at 88% 79%, rgba(255, 159, 209, 0.6) 0 2px, transparent 3px);
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
      animation: sparkleRise 8s ease-in-out infinite;
    }

    .whale {
      left: 31%;
      right: auto;
      top: 22%;
      bottom: auto;
      width: min(58vw, 575px);
      aspect-ratio: 2.05;
      border-radius: 62% 48% 48% 58%;
      background:
        radial-gradient(circle at 73% 40%, #1b275d 0 1.8%, rgba(255, 255, 255, 0.9) 2% 2.45%, transparent 2.7%),
        repeating-linear-gradient(98deg, transparent 0 14px, rgba(255, 255, 255, 0.22) 15px 17px, transparent 18px 27px),
        linear-gradient(112deg, rgba(255, 242, 154, 0.98) 0%, rgba(255, 151, 203, 0.92) 27%, rgba(120, 240, 232, 0.92) 53%, rgba(122, 145, 255, 0.94) 78%, rgba(255, 227, 245, 0.9) 100%);
      box-shadow:
        0 0 26px rgba(255, 255, 255, 0.92),
        0 0 48px rgba(140, 245, 234, 0.42),
        0 32px 76px rgba(65, 74, 170, 0.28);
      opacity: 0.82;
      transform: rotate(-16deg);
      animation: whaleDrift 9s ease-in-out infinite;
    }

    .whale::before {
      right: -21%;
      top: 12%;
      width: 35%;
      height: 74%;
      background: linear-gradient(135deg, rgba(129, 228, 255, 0.95), rgba(255, 152, 209, 0.88) 54%, rgba(255, 242, 154, 0.94));
      clip-path: polygon(0 46%, 76% 0, 100% 18%, 54% 50%, 100% 84%, 74% 100%);
    }

    .whale::after {
      left: 22%;
      bottom: -24%;
      width: 31%;
      height: 42%;
      background: linear-gradient(145deg, rgba(140, 245, 234, 0.9), rgba(255, 183, 224, 0.72), rgba(255, 242, 154, 0.7));
      filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.7));
      clip-path: polygon(14% 0, 100% 34%, 22% 100%, 0 70%);
    }

    .whale-sparkles {
      background:
        radial-gradient(circle at 45% 34%, rgba(255, 255, 255, 0.94) 0 2px, transparent 3px),
        radial-gradient(circle at 53% 42%, rgba(255, 242, 154, 0.88) 0 2px, transparent 3px),
        radial-gradient(circle at 61% 28%, rgba(140, 245, 234, 0.86) 0 2px, transparent 3px),
        radial-gradient(circle at 69% 52%, rgba(255, 159, 209, 0.78) 0 2px, transparent 3px),
        radial-gradient(circle at 34% 55%, rgba(255, 255, 255, 0.84) 0 2px, transparent 3px);
      opacity: 0.86;
      animation: sparkleRise 5.8s ease-in-out infinite;
    }

    .sailboat {
      left: 12%;
      bottom: 8%;
      width: 220px;
      height: 130px;
      opacity: 0.95;
      filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.9)) drop-shadow(0 12px 18px rgba(72, 91, 174, 0.2));
      animation: sailFloat 6.8s ease-in-out infinite;
    }

    .sailboat::before {
      border-color: rgba(255, 255, 255, 0.92);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(140, 245, 234, 0.22));
    }

    .sailboat::after {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 159, 209, 0.54), rgba(140, 245, 234, 0.38));
      box-shadow: -42px 26px 0 rgba(255, 242, 154, 0.46);
    }

    .sailboat-ghost {
      left: auto;
      right: 9%;
      bottom: 18%;
      transform: scale(0.62) rotate(3deg);
      opacity: 0.34;
      animation-delay: -2s;
    }

    .crystal-island {
      position: absolute;
      width: 168px;
      height: 92px;
      filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.84));
      opacity: 0.74;
    }

    .crystal-island::before {
      content: "";
      position: absolute;
      inset: 42px 0 0;
      border-radius: 60% 40% 46% 54%;
      background: linear-gradient(140deg, rgba(255, 242, 154, 0.72), rgba(140, 245, 234, 0.55), rgba(179, 165, 255, 0.62));
    }

    .crystal-island::after {
      content: "";
      position: absolute;
      left: 26px;
      bottom: 28px;
      width: 112px;
      height: 78px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(151, 229, 255, 0.72) 34%, rgba(255, 159, 209, 0.68) 68%, rgba(255, 242, 154, 0.82));
      clip-path: polygon(0 100%, 15% 22%, 34% 78%, 46% 0, 62% 72%, 78% 16%, 100% 100%);
    }

    .island-a {
      left: 4%;
      top: 14%;
      transform: rotate(-11deg);
    }

    .island-b {
      right: 6%;
      bottom: 5%;
      transform: scale(0.72) rotate(8deg);
      opacity: 0.58;
    }

    .jelly {
      opacity: 0.84;
      animation: jellyFloat 7.5s ease-in-out infinite;
    }

    .jelly::before {
      background: linear-gradient(135deg, rgba(255, 242, 154, 0.8), rgba(255, 159, 209, 0.76), rgba(140, 245, 234, 0.68));
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.48);
    }

    .jelly-c {
      right: 24%;
      bottom: 11%;
      transform: scale(0.58) rotate(16deg);
      opacity: 0.54;
      animation-delay: -2.5s;
    }

    .starfield {
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.98) 0 2px, transparent 3px),
        radial-gradient(circle at 34% 12%, rgba(255, 242, 154, 0.94) 0 2px, transparent 3px),
        radial-gradient(circle at 57% 31%, rgba(255, 255, 255, 0.92) 0 2px, transparent 3px),
        radial-gradient(circle at 86% 62%, rgba(255, 221, 244, 0.95) 0 2px, transparent 3px),
        radial-gradient(circle at 44% 82%, rgba(169, 255, 247, 0.96) 0 2px, transparent 3px),
        radial-gradient(circle at 72% 76%, rgba(255, 255, 255, 0.88) 0 1px, transparent 2px),
        radial-gradient(circle at 22% 46%, rgba(255, 159, 209, 0.86) 0 1px, transparent 2px);
      animation: sparkleRise 6.2s ease-in-out infinite;
    }

    .idle-panel {
      width: min(490px, 100%);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 222, 239, 0.58)),
        linear-gradient(90deg, rgba(140, 245, 234, 0.28), rgba(255, 242, 154, 0.24));
      box-shadow: 0 18px 42px rgba(65, 80, 168, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
    }

    .idle-title {
      color: #35449b;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.7);
    }

    .cursor-wave {
      border-color: rgba(140, 245, 234, 0.82);
      box-shadow: 0 0 22px rgba(140, 245, 234, 0.5), inset 0 0 16px rgba(255, 255, 255, 0.36);
    }

    .cursor-wave::before {
      border-color: rgba(255, 159, 209, 0.62);
    }

    .cursor-wave::after {
      border-color: rgba(255, 242, 154, 0.68);
    }

    .found-frame {
      border-color: rgba(255, 255, 255, 0.9);
      background: linear-gradient(135deg, #ffffff, #fff0f8);
      box-shadow:
        0 0 0 4px rgba(255, 255, 255, 0.28),
        0 0 24px rgba(140, 245, 234, 0.48),
        0 18px 34px rgba(52, 64, 140, 0.22);
    }

    .found-name {
      border-color: rgba(255, 255, 255, 0.8);
      background: linear-gradient(135deg, #fff, #ffe8f4);
      color: #33407e;
    }

    .member-strip {
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.72), rgba(237, 251, 255, 0.62)),
        linear-gradient(90deg, rgba(255, 159, 209, 0.16), rgba(140, 245, 234, 0.15));
    }

    .member-step {
      background: rgba(255, 255, 255, 0.72);
      color: #536098;
      box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.45);
    }

    .member-step::before {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: 17px 0 0 rgba(255, 255, 255, 0.74), -17px 0 0 rgba(255, 255, 255, 0.74);
    }

    .member-step.is-current {
      border-color: rgba(76, 235, 216, 0.9);
      color: #26396f;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(214, 255, 248, 0.76));
      box-shadow: 0 0 18px rgba(140, 245, 234, 0.42), inset 0 -4px 0 rgba(140, 245, 234, 0.34);
    }

    .member-step.is-found {
      border-color: rgba(255, 159, 209, 0.86);
      color: #5a3d77;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(255, 232, 246, 0.78));
    }

    .leaderboard-head {
      background: linear-gradient(105deg, rgba(255, 242, 154, 0.78), rgba(255, 159, 209, 0.64) 45%, rgba(140, 245, 234, 0.76));
    }

    .leaderboard-head h2 {
      color: #2b397c;
    }

    @keyframes slowSpin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes compassDrift {
      0%,
      100% {
        transform: translate(-50%, -50%) rotate(-4deg) scale(0.98);
      }
      50% {
        transform: translate(-50%, -50%) rotate(4deg) scale(1.02);
      }
    }

    @keyframes whaleDrift {
      0%,
      100% {
        transform: translateY(0) rotate(-16deg);
      }
      50% {
        transform: translateY(-12px) rotate(-13deg);
      }
    }

    @keyframes sailFloat {
      0%,
      100% {
        transform: translateY(0) rotate(-1deg);
      }
      50% {
        transform: translateY(-7px) rotate(2deg);
      }
    }

    @keyframes jellyFloat {
      0%,
      100% {
        translate: 0 0;
      }
      50% {
        translate: 0 -12px;
      }
    }

    @keyframes sparkleRise {
      0%,
      100% {
        opacity: 0.72;
        transform: translateY(0);
      }
      50% {
        opacity: 1;
        transform: translateY(-8px);
      }
    }

    @keyframes tideFloat {
      0%,
      100% {
        transform: rotate(-3deg) translateY(0);
      }
      50% {
        transform: rotate(-2deg) translateY(-10px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .aurora-rings,
      .compass-ring,
      .bubble-field,
      .whale,
      .whale-sparkles,
      .sailboat,
      .jelly,
      .starfield,
      .ocean-scene::before {
        animation: none !important;
      }
    }

    @media (max-width: 940px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .leaderboard {
        order: 2;
      }

      .score-list {
        max-height: 340px;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 18px, 1180px);
        padding-top: 14px;
      }

      .topbar {
        gap: 12px;
      }

      .hud {
        grid-template-columns: 1fr 1fr;
      }

      .hud-item {
        min-height: 62px;
        padding: 10px;
      }

      .hud-value {
        font-size: 1rem;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .primary-btn,
      .ghost-btn {
        width: 100%;
        padding: 0 10px;
      }

      .arena {
        height: min(68vh, 560px);
        min-height: 380px;
      }

      .whale {
        left: 21%;
        top: 28%;
        width: 92vw;
        opacity: 0.66;
      }

      .compass-ring {
        width: 112vw;
        height: 112vw;
        opacity: 0.42;
      }

      .sailboat {
        left: 8%;
        width: 150px;
        height: 92px;
      }

      .sailboat-ghost,
      .island-b,
      .jelly-c {
        display: none;
      }

      .crystal-island {
        transform: scale(0.72) rotate(-11deg);
        opacity: 0.48;
      }

      .sound-guide {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        width: 100%;
        border-radius: 8px;
      }

      .sound-guide span:first-child {
        grid-column: 1 / -1;
      }

      .sound-guide .guide-arrow {
        width: 28px;
      }

      .sound-guide-btn {
        width: 100%;
      }

      .member-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .found-pop {
        width: 104px;
        height: 126px;
      }

      .found-frame {
        width: 92px;
        height: 108px;
      }

      .score-row {
        grid-template-columns: 40px minmax(0, 1fr) 86px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <section class="title-block" aria-labelledby="gameTitle">
        <h1 id="gameTitle">寻找糯米香香吧 ！</h1>
        <p>移动鼠标依靠声音搜寻成员，必须按照指定顺序寻找，点错全盘重来，挑战用时登上排行榜</p>

        </div>
        <div class="hud-item">

        <div class="hud-item">

        <div class="hud-item">

    <div class="layout">
      <section class="game-column" aria-label="游戏区域">

        </div>
        <div class="sound-guide" aria-live="polite">
          <span>先点这里测试音量，听到 NMIXX 后再开始游戏</span>
          <span class="guide-arrow" aria-hidden="true">→</span>
          <button class="ghost-btn sound-guide-btn" id="soundUnlockBtn" type="button">开启声音</button>

        <div class="stage-wrap">
          <div class="arena" id="arena" aria-label="主游玩画布区域">
            <div class="ocean-scene" aria-hidden="true">
              <div class="aurora-rings"></div>

              <div class="bubble-field"></div>
              <div class="compass-ring"></div>
              <div class="crystal-island island-a"></div>
              <div class="crystal-island island-b"></div>
              <div class="jelly jelly-a"></div>
              <div class="jelly jelly-b"></div>
              <div class="jelly jelly-c"></div>
              <div class="sailboat"></div>

              </div>

      <aside class="leaderboard" aria-label="排行榜">

  </main>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-top">
        <h2 class="modal-title" id="modalTitle">提示</h2>
      </div>
      <div class="modal-body">
        <p class="modal-message" id="modalMessage"></p>
        <form class="name-form" id="nameForm" novalidate>
          <label for="playerName">恩瑟报上名来，速速上榜！</label>

        </div>

  </div>

  <script>
    "use strict";

    /**
     * 成员与素材统一配置。
     * 图片、距离提示循环音频按需求使用指定文件名；
     * hit_* 是命中专属音效的预留插槽，不放文件时会自动使用合成提示音。
     */
    const MEMBERS = [
      {
        name: "Lily",
        key: "lily",
        image: "lily.png",
        hintSound: "sound_lily.mp3",
        hitSound: "hit_lily.mp3",
        hintText: "werwerwer",
        color: "#ffe2ec",
        tone: 392
      },
      {
        name: "Haewon",
        key: "haewon",
        image: "haewon.png",
        hintSound: "sound_haewon.mp3",
        hitSound: "hit_haewon.mp3",
        hintText: "此女名句",
        color: "#dff6ef",
        tone: 440
      },
      {
        name: "Sullyoon",
        key: "sullyoon",
        image: "sullyoon.png",
        hintSound: "sound_sullyoon.mp3",
        hitSound: "hit_sullyoon.mp3",
        hintText: "林黛玉倒把垂杨柳",
        color: "#dcefff",
        tone: 494
      },
      {
        name: "Bae",
        key: "bae",
        image: "bae.png",
        hintSound: "sound_bae.mp3",
        hitSound: "hit_bae.mp3",
        hintText: "一个灭顶高音",
        color: "#fff4bb",
        tone: 523
      },
      {
        name: "Jiwoo",
        key: "jiwoo",
        image: "jiwoo.png",
        hintSound: "sound_jiwoo.mp3",
        hitSound: "hit_jiwoo.mp3",
        hintText: "小狗撒娇",
        color: "#ffe2d8",
        tone: 587
      },
      {
        name: "Kyujin",
        key: "kyujin",
        image: "kyujin.png",
        hintSound: "sound_kyujin.mp3",
        hitSound: "hit_kyujin.mp3",
        hintText: "小猫叫",
        color: "#eee8ff",
        tone: 659
      }
    ];

    const STORAGE_KEY = "nuomi-nmixx-leaderboard-v1";
    const LEADERBOARD_API = "/.netlify/functions/leaderboard";
    const MAX_SCORES = 100;
    const HIT_RADIUS = 42;
    const MAX_HINT_VOLUME = 0.92;
    const EMPTY_CLICK_TEXT = "再听听";

    const dom = {
      arena: document.getElementById("arena"),
      cursorWave: document.getElementById("cursorWave"),
      idleLayer: document.getElementById("idleLayer"),
      memberStrip: document.getElementById("memberStrip"),
      startBtn: document.getElementById("startBtn"),
      soundUnlockBtn: document.getElementById("soundUnlockBtn"),
      restartBtn: document.getElementById("restartBtn"),
      hintBtn: document.getElementById("hintBtn"),
      targetLabel: document.getElementById("targetLabel"),
      progressLabel: document.getElementById("progressLabel"),
      timerLabel: document.getElementById("timerLabel"),
      soundLabel: document.getElementById("soundLabel"),
      scoreList: document.getElementById("scoreList"),
      leaderboardStatus: document.getElementById("leaderboardStatus"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      modalTitle: document.getElementById("modalTitle"),
      modalMessage: document.getElementById("modalMessage"),
      nameForm: document.getElementById("nameForm"),
      playerName: document.getElementById("playerName"),
      formError: document.getElementById("formError"),
      modalCloseBtn: document.getElementById("modalCloseBtn"),
      submitScoreBtn: document.getElementById("submitScoreBtn")
    };

    const state = {
      isRunning: false,
      isComplete: false,
      currentIndex: 0,
      startedAt: 0,
      elapsedMs: 0,
      timerFrame: 0,
      audioFrame: 0,
      positions: [],
      pointer: null,
      finalTime: 0,
      modalMode: "info",
      audioReady: false,
      audioPrimed: false,
      lastStartupSoundAt: 0,
      audioContext: null,
      masterGain: null,
      unlockTester: null,
      audioItems: [],
      oneShotAudios: [],
      leaderboardScores: [],
      leaderboardOnline: false
    };

    /**
     * 距离提示音使用 WebAudio 解码 mp3 后循环播放。
     * 这样比直接调 HTMLAudioElement.volume 更适合手机浏览器。
     */
    function prepareHintAudio() {
      if (state.audioItems.length) return;

      state.audioItems = MEMBERS.map((member) => {
        return {
          member,
          audio: createHintElement(member.hintSound),
          buffer: null,
          source: null,
          hintGain: null,
          loadPromise: null,
          fileUsable: false,
          fileStarted: false,
          currentVolume: 0,
          targetVolume: 0
        };
      });
    }

    function createHintElement(src) {
      const audio = document.createElement("audio");
      audio.src = src;
      audio.loop = true;
      audio.preload = "auto";
      audio.volume = 0.001;
      audio.muted = false;
      audio.playsInline = true;
      audio.setAttribute("playsinline", "");
      audio.setAttribute("webkit-playsinline", "");
      audio.style.display = "none";
      audio.dataset.role = "member-hint-audio";
      document.body.appendChild(audio);
      return audio;
    }

    function initGeneratedAudio() {
      prepareHintAudio();
      if (state.audioContext) return true;

      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor) {
        dom.soundLabel.textContent = "\u97f3\u9891\u4e0d\u53ef\u7528";
        return false;
      }

      state.audioContext = new AudioContextCtor();
      state.masterGain = state.audioContext.createGain();
      state.masterGain.gain.value = 0.46;
      state.masterGain.connect(state.audioContext.destination);

      state.audioItems.forEach((item) => {
        if (item.hintGain) return;

        const gain = state.audioContext.createGain();
        gain.gain.value = 0;
        gain.connect(state.masterGain);
        item.hintGain = gain;
      });

      return true;
    }

    function hardUnlockAudio() {
      prepareHintAudio();
      initGeneratedAudio();
      dom.soundLabel.textContent = "\u6d4b\u8bd5\u58f0\u97f3";
      state.audioReady = true;
      state.audioPrimed = true;

      const resumePromise = state.audioContext && state.audioContext.state === "suspended"
        ? state.audioContext.resume().catch(() => {})
        : Promise.resolve();

      if (state.unlockTester) {
        state.unlockTester.pause();
        state.unlockTester.remove();
      }

      const tester = document.createElement("audio");
      tester.src = "nmixx.mp3";
      tester.preload = "auto";
      tester.volume = 1;
      tester.muted = false;
      tester.playsInline = true;
      tester.setAttribute("playsinline", "");
      tester.setAttribute("webkit-playsinline", "");
      tester.dataset.role = "unlock-test-audio";
      document.body.appendChild(tester);
      state.unlockTester = tester;

      // Mobile autoplay policy: call play() synchronously in the button click stack.
      tester.load();
      const testerPlay = tester.play();
      const testerPromise = testerPlay && typeof testerPlay.then === "function"
        ? testerPlay.then(() => true).catch(() => false)
        : Promise.resolve(true);
      const hintPromises = state.audioItems.map(startHintFileAudio);
      playUnlockTone();

      if (testerPlay && typeof testerPlay.then === "function") {
        testerPlay
          .then(() => {
            dom.soundLabel.textContent = "\u5df2\u5f00\u542f";
          })
          .catch(() => {
            dom.soundLabel.textContent = "\u6d4f\u89c8\u5668\u62e6\u622a";
          })
          .finally(() => {
            window.setTimeout(() => {
              tester.pause();
              tester.currentTime = 0;
            }, 1300);
          });
      } else {
        window.setTimeout(() => {
          tester.pause();
          tester.currentTime = 0;
        }, 1300);
      }

      Promise.allSettled([testerPromise, ...hintPromises]).then((results) => {
        const usableCount = results.filter((result) => result.status === "fulfilled" && result.value === true).length;
        dom.soundLabel.textContent = usableCount > 1 ? "\u5df2\u5f00\u542f" : "\u97f3\u9891\u52a0\u8f7d\u5931\u8d25";
      });
    }

    async function startHintFileAudio(item) {
      const htmlAudioReadyPromise = startHintElement(item);

      try {
        await loadHintBuffer(item);
        if (!state.audioContext || !item.hintGain) return htmlAudioReadyPromise;
        if (item.source) return true;

        const source = state.audioContext.createBufferSource();
        source.buffer = item.buffer;
        source.loop = true;
        source.connect(item.hintGain);
        source.start(0);
        item.source = source;
        item.fileStarted = true;
        item.fileUsable = true;
        dom.soundLabel.textContent = "已开启";
        return true;
      } catch (error) {
        const htmlAudioReady = await htmlAudioReadyPromise;
        item.fileStarted = htmlAudioReady;
        item.fileUsable = htmlAudioReady;
        return htmlAudioReady;
      }
    }

    function startHintElement(item) {
      if (!item.audio) return Promise.resolve(false);
      item.audio.volume = 0.001;
      item.audio.muted = false;
      item.audio.load();

      const playPromise = item.audio.play();
      if (playPromise && typeof playPromise.catch === "function") {
        return playPromise
          .then(() => {
            item.fileStarted = true;
            item.fileUsable = true;
            item.audio.volume = 0;
            return true;
          })
          .catch(() => false);
      }

      item.fileStarted = true;
      item.fileUsable = true;
      item.audio.volume = 0;
      return Promise.resolve(true);
    }

    async function loadHintBuffer(item) {
      if (item.buffer) return item.buffer;
      if (!item.loadPromise) {
        item.loadPromise = fetch(item.member.hintSound, { cache: "force-cache" })
          .then((response) => {
            if (!response.ok) {
              throw new Error(`Audio not found: ${item.member.hintSound}`);
            }
            return response.arrayBuffer();
          })
          .then((data) => state.audioContext.decodeAudioData(data));
      }

      item.buffer = await item.loadPromise;
      return item.buffer;
    }

    function stopHintAudio() {
      state.audioItems.forEach((item) => {
        item.targetVolume = 0;
        item.currentVolume = 0;
        if (item.hintGain && state.audioContext) {
          item.hintGain.gain.setTargetAtTime(0, state.audioContext.currentTime, 0.025);
        }
        if (item.audio) {
          item.audio.volume = 0;
        }
      });
      dom.soundLabel.textContent = state.isComplete ? "已通关" : "待开始";
    }

    function startAudioLoop() {
      cancelAnimationFrame(state.audioFrame);

      const tick = () => {
        updateAudioVolumes();
        state.audioFrame = requestAnimationFrame(tick);
      };

      tick();
    }

    function updateAudioVolumes() {
      const now = state.audioContext ? state.audioContext.currentTime : 0;

      state.audioItems.forEach((item) => {
        item.currentVolume += (item.targetVolume - item.currentVolume) * 0.14;
        const smoothVolume = item.currentVolume < 0.003 ? 0 : item.currentVolume;

        if (item.fileUsable && item.fileStarted) {
          if (item.hintGain && state.audioContext) {
            item.hintGain.gain.setTargetAtTime(clamp(smoothVolume, 0, 1), now, 0.035);
          }
          if (item.audio) {
            item.audio.volume = clamp(smoothVolume, 0, 1);
          }
        } else {
          if (item.hintGain && state.audioContext) {
            item.hintGain.gain.setTargetAtTime(0, now, 0.035);
          }
          if (item.audio) {
            item.audio.volume = 0;
          }
        }
      });
    }

    function setVolumesFromPointer(point) {
      if (!state.isRunning || !point) return;

      const rect = dom.arena.getBoundingClientRect();
      const audibleRadius = Math.max(190, Math.min(rect.width, rect.height) * 0.56);

      state.audioItems.forEach((item, index) => {
        const hiddenPoint = state.positions[index];
        const distance = Math.hypot(point.x - hiddenPoint.x, point.y - hiddenPoint.y);
        const closeness = clamp(1 - distance / audibleRadius, 0, 1);
        item.targetVolume = Math.pow(closeness, 1.9) * MAX_HINT_VOLUME;
      });
    }

    function muteTargets() {
      state.audioItems.forEach((item) => {
        item.targetVolume = 0;
      });
    }

    function startTimer() {
      cancelAnimationFrame(state.timerFrame);
      state.startedAt = performance.now();
      state.elapsedMs = 0;
      renderTimer(0);

      const tick = () => {
        if (!state.isRunning) return;
        state.elapsedMs = performance.now() - state.startedAt;
        renderTimer(state.elapsedMs);
        state.timerFrame = requestAnimationFrame(tick);
      };

      state.timerFrame = requestAnimationFrame(tick);
    }

    function stopTimer() {
      cancelAnimationFrame(state.timerFrame);
    }

    function renderTimer(ms) {
      dom.timerLabel.textContent = formatTime(ms);
    }

    function formatTime(ms) {
      const safeMs = Math.max(0, Math.floor(ms));
      const minutes = Math.floor(safeMs / 60000);
      const seconds = Math.floor((safeMs % 60000) / 1000);
      const millis = safeMs % 1000;
      return `${minutes}:${String(seconds).padStart(2, "0")}.${String(millis).padStart(3, "0")}`;
    }

    function resetRun(options = {}) {
      state.isRunning = false;
      state.isComplete = false;
      state.currentIndex = 0;
      state.elapsedMs = 0;
      state.finalTime = 0;
      state.pointer = null;
      stopTimer();
      muteTargets();
      stopHintAudio();
      shufflePositions();
      renderTimer(0);
      renderHud();
      renderMemberStrip();
      renderScores();
      dom.startBtn.disabled = false;
      dom.idleLayer.style.display = "grid";
      dom.cursorWave.classList.remove("is-visible");

      if (options.clearPops) {
        dom.arena.querySelectorAll(".found-pop, .click-note").forEach((node) => node.remove());
      }
    }

    async function startGame() {
      closeModal();
      resetRun({ clearPops: true });
      state.isRunning = true;
      state.isComplete = false;
      dom.startBtn.disabled = true;
      dom.idleLayer.style.display = "none";
      renderHud();
      startTimer();
      startAudioLoop();
    }

    function shufflePositions() {
      const rect = dom.arena.getBoundingClientRect();
      const width = Math.max(320, rect.width || dom.arena.clientWidth || 320);
      const height = Math.max(360, rect.height || dom.arena.clientHeight || 420);
      const pad = HIT_RADIUS + 18;
      const minDistance = clamp(Math.min(width, height) * 0.18, 58, 118);
      const points = [];

      MEMBERS.forEach(() => {
        let point = null;

        for (let attempt = 0; attempt < 160; attempt += 1) {
          const candidate = {
            x: randomBetween(pad, width - pad),
            y: randomBetween(pad, height - pad)
          };

          if (points.every((existing) => Math.hypot(candidate.x - existing.x, candidate.y - existing.y) >= minDistance)) {
            point = candidate;
            break;
          }
        }

        points.push(point || {
          x: randomBetween(pad, width - pad),
          y: randomBetween(pad, height - pad)
        });
      });

      state.positions = points;
    }

    function handlePointerMove(event) {
      const point = getArenaPoint(event);
      if (!point) return;

      state.pointer = point;
      dom.cursorWave.style.transform = `translate3d(${point.x}px, ${point.y}px, 0) translate(-50%, -50%)`;

      if (state.isRunning) {
        dom.cursorWave.classList.add("is-visible");
        setVolumesFromPointer(point);
      }
    }

    function handlePointerLeave() {
      state.pointer = null;
      muteTargets();
      dom.cursorWave.classList.remove("is-visible");
    }

    function handleArenaClick(event) {
      if (!state.isRunning) return;

      const point = getArenaPoint(event);
      if (!point) return;

      setVolumesFromPointer(point);
      const hitIndex = findHitMemberIndex(point);

      if (hitIndex === -1) {
        showClickNote(point, EMPTY_CLICK_TEXT);
        return;
      }

      if (hitIndex !== state.currentIndex) {
        failGame(point);
        return;
      }

      handleCorrectHit(point);
    }

    function findHitMemberIndex(point) {
      let nearestIndex = -1;
      let nearestDistance = Infinity;

      state.positions.forEach((hiddenPoint, index) => {
        const distance = Math.hypot(point.x - hiddenPoint.x, point.y - hiddenPoint.y);
        if (distance <= HIT_RADIUS && distance < nearestDistance) {
          nearestIndex = index;
          nearestDistance = distance;
        }
      });

      return nearestIndex;
    }

    function handleCorrectHit(point) {
      const member = MEMBERS[state.currentIndex];
      showFoundMember(member, point);
      playHitSound(member);
      state.currentIndex += 1;

      if (state.currentIndex >= MEMBERS.length) {
        completeGame();
        return;
      }

      shufflePositions();
      renderHud();
      renderMemberStrip();
      setVolumesFromPointer(point);
    }

    function failGame(point) {
      state.isRunning = false;
      state.isComplete = false;
      stopTimer();
      stopHintAudio();
      renderTimer(0);
      navigator.vibrate?.([80, 40, 120]);
      playErrorSound();
      showClickNote(point, "点错了");
      openInfoModal("哔哔哔——请从头开始寻找！", "进度和计时已清零，下一局仍然从 Lily 开始。");
      resetRun();
    }

    function completeGame() {
      state.isRunning = false;
      state.isComplete = true;
      state.finalTime = state.elapsedMs;
      stopTimer();
      stopHintAudio();
      renderTimer(state.finalTime);
      renderHud();
      renderMemberStrip();
      dom.startBtn.disabled = false;
      dom.cursorWave.classList.remove("is-visible");
      dom.idleLayer.style.display = "grid";
      playCompleteSound();

      if (qualifiesForTop100(state.finalTime)) {
        openScoreModal(state.finalTime);
      } else {
        openInfoModal("恭喜这位恩瑟找齐全部成员！", `本局用时 ${formatTime(state.finalTime)}，距离前 100 名还差一点点。`);
      }
    }

    function renderHud() {
      const target = MEMBERS[Math.min(state.currentIndex, MEMBERS.length - 1)];
      dom.targetLabel.textContent = state.isComplete ? "已找齐" : target.name;
      dom.progressLabel.textContent = `${Math.min(state.currentIndex, MEMBERS.length)} / ${MEMBERS.length}`;

      if (!state.isRunning && !state.isComplete && !state.audioReady) {
        dom.soundLabel.textContent = "待开始";
      }
    }

    function showCurrentHint() {
      if (state.isComplete) {
        openInfoModal("提示", "已经找齐全部成员啦，可以重新开局再挑战一次！");
        return;
      }

      const target = MEMBERS[Math.min(state.currentIndex, MEMBERS.length - 1)];
      openInfoModal(`${target.name} 提示`, target.hintText || "暂无提示");
    }

    function renderMemberStrip() {
      dom.memberStrip.innerHTML = MEMBERS.map((member, index) => {
        const className = [
          "member-step",
          index < state.currentIndex ? "is-found" : "",
          index === state.currentIndex && !state.isComplete ? "is-current" : ""
        ].filter(Boolean).join(" ");

        return `
          <div class="${className}" style="--step-color: ${member.color}">
            <span>${index + 1}. ${member.name}</span>
          </div>
        `;
      }).join("");
    }

    function showFoundMember(member, point) {
      const pop = document.createElement("div");
      pop.className = "found-pop";
      pop.style.left = `${point.x}px`;
      pop.style.top = `${point.y}px`;
      pop.style.setProperty("--avatar-bg", member.color);
      pop.innerHTML = `
        <div class="found-frame">
          <div class="fallback-avatar">${member.name.slice(0, 1)}</div>
          <img src="${member.image}" alt="${member.name}">
          <div class="found-name">${member.name}</div>
        </div>
      `;

      const image = pop.querySelector("img");
      image.addEventListener("error", () => {
        image.remove();
      });

      image.addEventListener("load", () => {
        const fallback = pop.querySelector(".fallback-avatar");
        if (fallback) fallback.style.display = "none";
      });

      dom.arena.appendChild(pop);
      pop.addEventListener("animationend", () => pop.remove());
    }

    function showClickNote(point, text) {
      const note = document.createElement("div");
      note.className = "click-note";
      note.style.left = `${point.x}px`;
      note.style.top = `${point.y}px`;
      note.textContent = text;
      dom.arena.appendChild(note);
      note.addEventListener("animationend", () => note.remove());
    }

    function playHitSound(member) {
      playFileOnce(member.hitSound, 0.95, () => playGeneratedHit(member.tone));
    }

    function playCompleteSound() {
      playFileOnce("nmixx.mp3", 1, playGeneratedComplete);
    }

    function playErrorSound() {
      playFileOnce("error.mp3", 0.9, playGeneratedError);
    }

    function playUnlockTone() {
      if (!state.audioContext || !state.masterGain) return;

      const now = state.audioContext.currentTime;
      playTone(523, now, 0.08, 0.08);
      playTone(784, now + 0.07, 0.08, 0.08);
    }

    function playFileOnce(src, volume, fallback) {
      const audio = new Audio(src);
      audio.preload = "auto";
      audio.volume = volume;
      audio.muted = false;
      audio.setAttribute("playsinline", "");
      audio.setAttribute("webkit-playsinline", "");
      state.oneShotAudios.push(audio);

      let settled = false;

      const finishWithFallback = () => {
        if (settled) return;
        settled = true;
        fallback();
      };

      const markPlaying = () => {
        settled = true;
      };

      const cleanup = () => {
        state.oneShotAudios = state.oneShotAudios.filter((item) => item !== audio);
      };

      window.setTimeout(finishWithFallback, 700);
      audio.addEventListener("playing", markPlaying, { once: true });
      audio.addEventListener("error", finishWithFallback, { once: true });
      audio.addEventListener("ended", cleanup, { once: true });

      const playPromise = audio.play();
      if (playPromise && typeof playPromise.then === "function") {
        playPromise.then(markPlaying).catch(finishWithFallback);
      }
    }

    function playGeneratedHit(baseTone) {
      if (!state.audioContext || !state.masterGain) return;

      const now = state.audioContext.currentTime;
      [0, 0.08, 0.16].forEach((offset, index) => {
        playTone(baseTone * [1, 1.25, 1.5][index], now + offset, 0.07, 0.16);
      });
    }

    function playGeneratedComplete() {
      if (!state.audioContext || !state.masterGain) return;

      const now = state.audioContext.currentTime;
      [392, 494, 587, 784, 988].forEach((tone, index) => {
        playTone(tone, now + index * 0.08, 0.12, 0.18);
      });
    }

    function playGeneratedError() {
      if (!state.audioContext || !state.masterGain) return;

      const now = state.audioContext.currentTime;
      playTone(150, now, 0.12, 0.26, "sawtooth");
      playTone(92, now + 0.08, 0.12, 0.24, "sawtooth");
    }

    function playTone(frequency, startAt, duration, volume, type = "triangle") {
      const oscillator = state.audioContext.createOscillator();
      const gain = state.audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startAt);
      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
      oscillator.connect(gain);
      gain.connect(state.masterGain);
      oscillator.start(startAt);
      oscillator.stop(startAt + duration + 0.03);
    }

    function getArenaPoint(event) {
      const rect = dom.arena.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      if (x < 0 || y < 0 || x > rect.width || y > rect.height) {
        return null;
      }

      return { x, y };
    }

    function loadLocalScores() {
      return [];
    }

    function saveLocalScores(scores) {
      state.leaderboardScores = sanitizeScores(scores).slice(0, MAX_SCORES);
    }

    function getCachedScores() {
      return state.leaderboardScores;
    }

    async function fetchSharedScores() {
      dom.leaderboardStatus.textContent = "共享排行榜连接中...";
      const response = await fetch(LEADERBOARD_API, {
        method: "GET",
        headers: { "Accept": "application/json" },
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`Leaderboard GET failed: ${response.status}`);
      }

      const payload = await response.json();
      if (payload.cloud !== true) {
        throw new Error("Cloud leaderboard is not active");
      }
      const scores = sanitizeScores(payload.scores || []);
      state.leaderboardScores = scores;
      state.leaderboardOnline = true;
      saveLocalScores(scores);
      dom.leaderboardStatus.textContent = "共享排行榜已连接，所有玩家可见。";
      return scores;
    }

    async function postSharedScore(id, time) {
      dom.leaderboardStatus.textContent = "正在上传到共享排行榜...";
      const response = await fetch(LEADERBOARD_API, {
        method: "POST",
        headers: {
          "Accept": "application/json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ id, time })
      });

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || `Leaderboard POST failed: ${response.status}`);
      }
      if (payload.cloud !== true) {
        throw new Error("Cloud leaderboard is not active");
      }

      const scores = sanitizeScores(payload.scores || []);
      state.leaderboardScores = scores;
      state.leaderboardOnline = true;
      saveLocalScores(scores);
      dom.leaderboardStatus.textContent = "共享排行榜已更新，所有玩家可见。";

      return {
        scores,
        accepted: payload.accepted !== false,
        previousBest: payload.previousBest
      };
    }

    function sanitizeScores(scores) {
      const byId = new Map();

      if (!Array.isArray(scores)) return [];

      scores.forEach((score) => {
        const id = String(score.id || "").trim();
        const time = Number(score.time);
        if (!id || !Number.isFinite(time) || time < 0) return;

        const normalizedId = id.toLocaleLowerCase();
        const existing = byId.get(normalizedId);

        if (!existing || time < existing.time) {
          byId.set(normalizedId, {
            id,
            time,
            createdAt: score.createdAt || new Date().toISOString()
          });
        }
      });

      return Array.from(byId.values()).sort((a, b) => a.time - b.time).slice(0, MAX_SCORES);
    }

    function qualifiesForTop100(time) {
      const scores = state.leaderboardOnline ? getCachedScores() : [];
      return scores.length < MAX_SCORES || time < scores[scores.length - 1].time;
    }

    async function submitScore() {
      const id = dom.playerName.value.trim();

      if (!id) {
        dom.formError.textContent = "请填写昵称。";
        dom.playerName.focus();
        return;
      }

      dom.submitScoreBtn.disabled = true;
      dom.formError.textContent = "正在上传成绩...";
      const scores = state.leaderboardOnline ? getCachedScores() : [];
      const normalizedId = id.toLocaleLowerCase();
      const previous = scores.find((score) => score.id.toLocaleLowerCase() === normalizedId);

      if (previous && previous.time <= state.finalTime) {
        dom.formError.textContent = `该 ID 已有更快成绩：${formatTime(previous.time)}。`;
        dom.submitScoreBtn.disabled = false;
        return;
      }

      try {
        const result = await postSharedScore(id, state.finalTime);

        if (!result.accepted && result.previousBest) {
          dom.formError.textContent = `该 ID 已有更快成绩：${formatTime(result.previousBest)}。`;
          return;
        }

        renderScores(result.scores);
        closeModal();
      } catch (error) {
        state.leaderboardOnline = false;
        dom.leaderboardStatus.textContent = "\u5171\u4eab\u6392\u884c\u699c\u672a\u8fde\u63a5\uff1a\u8bf7\u786e\u8ba4 Netlify \u5df2\u4ece GitHub \u90e8\u7f72\u5e76\u542f\u7528 Functions\u3002";
        dom.formError.textContent = "\u5171\u4eab\u6392\u884c\u699c\u672a\u8fde\u63a5\uff0c\u6210\u7ee9\u6ca1\u6709\u4e0a\u4f20\u3002\u8bf7\u91cd\u65b0\u90e8\u7f72 GitHub \u5230 Netlify \u540e\u518d\u8bd5\u3002";
      } finally {
        dom.submitScoreBtn.disabled = false;
      }
    }

    async function renderScores(scores = null) {
      const currentScores = scores || (state.leaderboardOnline ? getCachedScores() : []);

      if (!currentScores.length) {
        dom.scoreList.innerHTML = '<div class="empty-score">还没有记录，第一位恩瑟正在路上。</div>';
      } else {
        dom.scoreList.innerHTML = currentScores.map((score, index) => `
          <div class="score-row">
            <div class="score-rank">${index + 1}</div>
            <div class="score-id" title="${escapeHtml(score.id)}">${escapeHtml(score.id)}</div>
            <div class="score-time">${formatTime(score.time)}</div>
          </div>
        `).join("");
      }

      if (!scores && !state.leaderboardOnline) {
        try {
          const sharedScores = await fetchSharedScores();
          renderScores(sharedScores);
        } catch (error) {
          state.leaderboardOnline = false;
          state.leaderboardScores = [];
          dom.leaderboardStatus.textContent = "\u5171\u4eab\u6392\u884c\u699c\u672a\u8fde\u63a5\uff1a\u8bf7\u786e\u8ba4 Netlify Functions \u5df2\u90e8\u7f72\u3002";
          dom.scoreList.innerHTML = '<div class="empty-score">\u4e91\u7aef\u6392\u884c\u699c\u672a\u8fde\u63a5\u3002\u6253\u5f00 /.netlify/functions/leaderboard \u5e94\u8be5\u770b\u5230 cloud:true\u3002</div>';
        }
      }
    }

    function openScoreModal(time) {
      state.modalMode = "score";
      dom.modalTitle.textContent = "恭喜这位恩瑟找齐全部成员！";
      dom.modalMessage.textContent = `本局用时 ${formatTime(time)}。`;
      dom.nameForm.classList.add("is-visible");
      dom.submitScoreBtn.style.display = "inline-flex";
      dom.modalCloseBtn.textContent = "稍后再说";
      dom.formError.textContent = "";
      dom.playerName.value = "";
      dom.modalBackdrop.classList.add("is-open");
      window.setTimeout(() => dom.playerName.focus(), 80);
    }

    function openInfoModal(title, message) {
      state.modalMode = "info";
      dom.modalTitle.textContent = title;
      dom.modalMessage.textContent = message;
      dom.nameForm.classList.remove("is-visible");
      dom.submitScoreBtn.style.display = "none";
      dom.modalCloseBtn.textContent = "知道了";
      dom.formError.textContent = "";
      dom.modalBackdrop.classList.add("is-open");
    }

    function closeModal() {
      dom.modalBackdrop.classList.remove("is-open");
    }

    function randomBetween(min, max) {
      return min + Math.random() * Math.max(0, max - min);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function bindEvents() {
      dom.soundUnlockBtn.addEventListener("click", hardUnlockAudio);
      dom.startBtn.addEventListener("click", startGame);
      dom.restartBtn.addEventListener("click", () => resetRun({ clearPops: true }));
      dom.hintBtn.addEventListener("click", showCurrentHint);
      dom.arena.addEventListener("pointerdown", handlePointerMove);
      dom.arena.addEventListener("pointermove", handlePointerMove);
      dom.arena.addEventListener("pointerleave", handlePointerLeave);
      dom.arena.addEventListener("pointercancel", handlePointerLeave);
      dom.arena.addEventListener("pointerup", handleArenaClick);
      dom.submitScoreBtn.addEventListener("click", submitScore);
      dom.modalCloseBtn.addEventListener("click", closeModal);
      dom.nameForm.addEventListener("submit", (event) => {
        event.preventDefault();
        submitScore();
      });
      dom.playerName.addEventListener("input", () => {
        dom.formError.textContent = "";
      });
      dom.modalBackdrop.addEventListener("click", (event) => {
        if (event.target === dom.modalBackdrop && state.modalMode !== "score") {
          closeModal();
        }
      });
      window.addEventListener("resize", () => {
        if (!state.isRunning) {
          shufflePositions();
        }
      });
      window.addEventListener("storage", (event) => {
        if (event.key === STORAGE_KEY) {
          renderScores();
        }
      });
    }

    function boot() {
      bindEvents();
      shufflePositions();
      renderHud();
      renderMemberStrip();
      renderScores();
    }

    boot();
  </script>
</body>
</html>
